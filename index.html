<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0f13"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DAN v1"/>
  <title>DAN v1</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body { font-family: 'Sora', sans-serif; background: #090f0b; color: #e8e6f0; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a22; }
    ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 2px; }
    input, textarea, select, button { font-family: 'Sora', sans-serif; }
    button { cursor: pointer; }
    a { text-decoration: none; }

    .app { min-height: 100vh; transition: background 0.3s; }
    .header { padding: 22px 20px 0; max-width: 720px; margin: 0 auto; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .content { max-width: 720px; margin: 0 auto; padding: 20px 20px 80px; }

    /* Profile switcher */
    .profile-btn { display: flex; align-items: center; gap: 8px; background: #13131a; border-radius: 10px; padding: 8px 14px; border: 1px solid #2a2a38; transition: border-color 0.3s; }
    .profile-btn span { font-size: 14px; font-weight: 600; }
    .profile-menu { position: absolute; top: calc(100% + 8px); left: 0; background: #14141c; border: 1px solid #2a2a38; border-radius: 12px; overflow: hidden; z-index: 50; min-width: 200px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); display: none; }
    .profile-menu.open { display: block; }
    .profile-option { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 16px; background: transparent; border: none; color: #9090b0; font-size: 14px; font-weight: 400; border-left: 3px solid transparent; text-align: left; transition: background 0.15s; }
    .profile-option:hover { background: #1a1a24; }
    .profile-option.active { background: #1c1c28; font-weight: 600; }
    .profile-option .active-badge { margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace; opacity: 0.7; }
    .backdrop { position: fixed; inset: 0; z-index: 40; display: none; }
    .backdrop.open { display: block; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; border-bottom: 1px solid #1c1c28; }
    .tab-btn { display: flex; align-items: center; gap: 6px; padding: 10px 16px; font-size: 13px; font-weight: 500; color: #6b6b8a; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
    .tab-btn.active { border-bottom-color: currentColor; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Inputs */
    .input { background: #1a1a22; border: 1px solid #2a2a38; color: #e8e6f0; border-radius: 8px; padding: 9px 13px; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
    .input:focus { border-color: var(--accent); }
    .btn { border: none; color: white; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: filter 0.2s; display: inline-flex; align-items: center; gap: 6px; }
    .btn:hover { filter: brightness(1.15); }
    .btn-ghost { background: none; border: 1px solid #2a2a38; color: #6b6b8a; padding: 7px 14px; border-radius: 8px; font-size: 13px; }
    .btn-icon { background: none; border: none; color: #2e2e40; padding: 4px; transition: color 0.15s; }
    .btn-icon:hover { color: #ef4444; }

    /* Todos */
    .todo-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #13131a; border-radius: 10px; border: 1px solid #1c1c28; transition: opacity 0.2s; animation: slideIn 0.18s ease; }
    .todo-row.done { opacity: 0.45; }
    .todo-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #3a3a50; background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
    .todo-check.checked { border: none; }
    .todo-text { flex: 1; font-size: 14px; }
    .todo-text.done { text-decoration: line-through; color: #3a3a50; }
    .priority-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-family: 'DM Mono', monospace; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    /* Notes */
    .note-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: #13131a; border-radius: 10px; border: 1px solid #1c1c28; border-left: 3px solid; cursor: pointer; transition: background 0.15s; margin-bottom: 7px; }
    .note-card:hover { background: #1a1a24; }
    .note-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
    .note-preview { font-size: 11px; color: #3a3a50; font-family: 'DM Mono', monospace; display: flex; gap: 8px; align-items: center; }
    .folder-sidebar { width: 155px; flex-shrink: 0; }
    .folder-row { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 2px; border: 1px solid transparent; transition: background 0.15s; position: relative; }
    .folder-row:hover { background: #1a1a24; }
    .folder-row .folder-count { margin-left: auto; font-size: 11px; font-family: 'DM Mono', monospace; opacity: 0.6; }
    .folder-del { position: absolute; right: 4px; background: none; border: none; color: transparent; padding: 2px; transition: color 0.15s; font-size: 0; }
    .folder-row:hover .folder-del { color: #ef4444; }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-day-hdr { text-align: center; font-size: 11px; font-family: 'DM Mono', monospace; color: #3a3a50; padding: 4px 0; }
    .cal-cell { min-height: 58px; padding: 6px 5px; border-radius: 8px; background: #13131a; border: 1px solid #1a1a22; transition: background 0.15s; cursor: pointer; }
    .cal-cell:hover { background: #1e1e2a; }
    .cal-cell.empty { background: transparent; border: none; cursor: default; }
    .cal-cell.today { }
    .cal-num { font-size: 12px; text-align: right; margin-bottom: 3px; color: #909090; }
    .cal-num.today { font-weight: 700; }
    .cal-ev-pill { font-size: 10px; border-radius: 3px; padding: 1px 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #17171f; border: 1px solid #2a2a38; border-radius: 16px; padding: 24px; width: 90%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }

    /* Event card in modal */
    .ev-card { background: #0f0f13; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .ev-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .ev-meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b6b8a; margin-top: 5px; }
    .ev-meta:hover { color: var(--accent); }

    /* Event list */
    .ev-list-item { padding: 10px 14px; background: #13131a; border-radius: 8px; border: 1px solid #1c1c28; margin-bottom: 6px; }
    .ev-list-top { display: flex; align-items: center; gap: 10px; }
    .ev-date { font-family: 'DM Mono', monospace; font-size: 12px; min-width: 90px; flex-shrink: 0; }
    .ev-list-meta { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b6b8a; margin-top: 5px; margin-left: 100px; }

    /* Attach panel */
    .attach-panel { margin-top: 16px; padding: 14px; background: #13131a; border-radius: 10px; border: 1px solid #1c1c28; }
    .attach-label { font-size: 11px; color: #6b6b8a; margin-bottom: 10px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
    .attach-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

    /* Note editor */
    .editor-title { width: 100%; background: transparent; border: none; border-bottom: 1px solid #2a2a38; color: #e8e6f0; font-size: 18px; font-weight: 600; padding: 0 0 10px; outline: none; font-family: inherit; margin-bottom: 12px; }
    .editor-body { width: 100%; background: transparent; border: none; color: #e8e6f0; font-size: 14px; line-height: 1.75; outline: none; font-family: inherit; resize: vertical; padding: 0; }

    .date-label { font-size: 12px; color: #5a5a78; font-family: 'DM Mono', monospace; }
    .section-label { font-size: 11px; font-family: 'DM Mono', monospace; color: #5a5a78; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .empty-state { text-align: center; padding: 60px 0; color: #2e2e40; }
    .empty-state svg { margin-bottom: 10px; opacity: 0.4; }
    .empty-state p { font-size: 14px; margin-top: 10px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .flex1 { flex: 1; }
    .notes-layout { display: flex; gap: 14px; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ─── SVG Icons ────────────────────────────────────────────────────────────────
const ICONS = {
  user: '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  rocket: '<path d="M4.5 16.5c-1.5 1-1.5 2.5 0 5 .5.5 2.5 1.5 4 0 0-1.5-2-3-4-5z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',
  star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  briefcase: '<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
  chevronDown: '<polyline points="6 9 12 15 18 9"/>',
  chevronLeft: '<polyline points="15 18 9 12 15 6"/>',
  chevronRight: '<polyline points="9 18 15 12 9 6"/>',
  x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  check: '<polyline points="20 6 9 12 4 8"/>',
  trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>',
  save: '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
  fileText: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>',
  checkSquare: '<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  calendar: '<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  folder: '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  folderOpen: '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="2 10 22 10"/>',
  alignLeft: '<line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/>',
  link: '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
  paperclip: '<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
  mapPin: '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  externalLink: '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',
};

function icon(name, size=16, color='currentColor') {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

// ─── Data ─────────────────────────────────────────────────────────────────────
const PROFILES = [
  { id:'personal',     label:'Personal',     icon:'user',      accent:'#22c55e', accentDim:'#22c55e15', accentBorder:'#22c55e40', bg:'#090f0b' },
  { id:'ventures',     label:'Ventures',     icon:'rocket',    accent:'#eab308', accentDim:'#eab30815', accentBorder:'#eab30840', bg:'#0f0e06' },
  { id:'professional', label:'Professional', icon:'star',      accent:'#3b82f6', accentDim:'#3b82f615', accentBorder:'#3b82f640', bg:'#07090f' },
  { id:'work',         label:'Work',         icon:'briefcase', accent:'#ef4444', accentDim:'#ef444415', accentBorder:'#ef444440', bg:'#0f0707' },
];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function pkey(pid, k) { return `db_${pid}_${k}`; }

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  profileId: load('db_activeProfile', 'personal'),
  tab: 'todos',
  showProfileMenu: false,

  // todos
  newTodo: '', todoPriority: 'medium',

  // notes
  editingNote: null,
  selectedFolder: null,
  showNewFolder: false,
  newFolderName: '',
  noteShowAttach: false,
  noteNewLink: '', noteNewLinkLabel: '',
  // editing fields
  editTitle: '', editBody: '', editFolder: '', editLinks: [], editFiles: [],

  // calendar
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  selectedDay: null,
  showEventModal: false,
  evtText: '', evtAddress: '', evtUrl: '', evtShowExtra: false,
};

function profile() { return PROFILES.find(p => p.id === state.profileId); }
function todos() { return load(pkey(state.profileId,'todos'), []); }
function notes() { return load(pkey(state.profileId,'notes'), []); }
function calEvents() { return load(pkey(state.profileId,'calevents'), []); }
function folders() { return load(pkey(state.profileId,'folders'), []); }

function setTodos(v) { save(pkey(state.profileId,'todos'), v); }
function setNotes(v) { save(pkey(state.profileId,'notes'), v); }
function setCalEvents(v) { save(pkey(state.profileId,'calevents'), v); }
function setFolders(v) { save(pkey(state.profileId,'folders'), v); }

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const p = profile();
  const today = new Date();
  document.body.style.background = p.bg;
  document.documentElement.style.setProperty('--accent', p.accent);

  const tds = todos();
  const nts = notes();
  const evts = calEvents();
  const flds = folders();

  const visibleNotes = state.selectedFolder === null ? nts : nts.filter(n => (n.folder||'') === state.selectedFolder);

  // Calendar grid
  const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
  const firstDay = new Date(state.calYear, state.calMonth, 1).getDay();
  const calGrid = [];
  for (let i=0; i<firstDay; i++) calGrid.push(null);
  for (let d=1; d<=daysInMonth; d++) calGrid.push(d);

  const todayMs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const allSorted = [...evts].sort((a,b) => new Date(a.year,a.month,a.day) - new Date(b.year,b.month,b.day));
  const upcoming = allSorted.filter(e => new Date(e.year,e.month,e.day).getTime() >= todayMs);
  const past = allSorted.filter(e => new Date(e.year,e.month,e.day).getTime() < todayMs);

  function eventsForDay(day) { return evts.filter(e => e.day===day && e.month===state.calMonth && e.year===state.calYear); }
  function isToday(day) { return day===today.getDate() && state.calMonth===today.getMonth() && state.calYear===today.getFullYear(); }

  const priorityColor = { high:'#ef4444', medium:'#f59e0b', low:'#6ee7b7' };
  const priorityLabel = { high:'High', medium:'Med', low:'Low' };

  // ── Profile menu ──
  const profileMenuHtml = `
    <div class="profile-menu ${state.showProfileMenu?'open':''}" id="profileMenu">
      ${PROFILES.map(pr => `
        <button class="profile-option ${pr.id===state.profileId?'active':''}" 
          style="color:${pr.id===state.profileId?pr.accent:'#9090b0'};border-left-color:${pr.id===state.profileId?pr.accent:'transparent'}"
          onclick="switchProfile('${pr.id}')">
          ${icon(pr.icon,14,pr.id===state.profileId?pr.accent:'#5a5a78')}
          ${pr.label}
          ${pr.id===state.profileId?`<span class="active-badge" style="color:${pr.accent}">active</span>`:''}
        </button>
      `).join('')}
    </div>`;

  // ── Tabs ──
  const tabsHtml = `
    <div class="tabs">
      ${[
        {id:'todos',label:'To-Do',icon:'checkSquare'},
        {id:'notes',label:'Notes',icon:'fileText'},
        {id:'calendar',label:'Calendar',icon:'calendar'},
      ].map(t => `
        <button class="tab-btn ${state.tab===t.id?'active':''}" 
          style="color:${state.tab===t.id?p.accent:'#6b6b8a'}"
          onclick="setTab('${t.id}')">
          ${icon(t.icon,14,state.tab===t.id?p.accent:'#6b6b8a')} ${t.label}
        </button>
      `).join('')}
    </div>`;

  // ── To-Do tab ──
  const todosHtml = `
    <div class="row" style="margin-bottom:20px">
      <input class="input flex1" id="newTodoInput" placeholder="Add a task…" value="${esc(state.newTodo)}"
        oninput="state.newTodo=this.value" onkeydown="if(event.key==='Enter')addTodo()" style="--accent:${p.accent}"/>
      <select class="input" style="width:auto;padding:0 10px" onchange="state.todoPriority=this.value">
        <option value="high" ${state.todoPriority==='high'?'selected':''}>High</option>
        <option value="medium" ${state.todoPriority==='medium'?'selected':''}>Med</option>
        <option value="low" ${state.todoPriority==='low'?'selected':''}>Low</option>
      </select>
      <button class="btn" style="background:${p.accent};padding:0 14px;height:38px" onclick="addTodo()">${icon('plus',16,'white')}</button>
    </div>
    ${tds.length>0?`<div style="font-size:12px;color:#5a5a78;font-family:'DM Mono',monospace;margin-bottom:16px;display:flex;gap:16px">
      <span>${tds.filter(t=>!t.done).length} remaining</span><span>·</span><span>${tds.filter(t=>t.done).length} done</span>
    </div>`:''}
    ${tds.length===0?`<div class="empty-state">${icon('checkSquare',28,'#2e2e40')}<p>No tasks yet for ${p.label}.</p></div>`:''}
    ${tds.map(t => `
      <div class="todo-row ${t.done?'done':''}">
        <button class="todo-check ${t.done?'checked':''}" style="${t.done?`background:${p.accent};`:''}border-color:#3a3a50" onclick="toggleTodo('${t.id}')">
          ${t.done?icon('check',12,'white'):''}
        </button>
        <span class="todo-text ${t.done?'done':''}">${esc(t.text)}</span>
        <span class="priority-badge" style="background:${priorityColor[t.priority]}20;color:${priorityColor[t.priority]}">${priorityLabel[t.priority]}</span>
        <button class="btn-icon" onclick="deleteTodo('${t.id}')">${icon('trash',14,'currentColor')}</button>
      </div>
    `).join('')}`;

  // ── Notes tab ──
  let notesHtml = '';
  if (state.editingNote) {
    const n = state.editingNote;
    notesHtml = `
      <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
        <button class="btn" style="background:${p.accent}" onclick="saveNote()">${icon('save',13,'white')} Save</button>
        <button class="btn-ghost" onclick="cancelEdit()">Cancel</button>
        <select class="input" style="width:auto;padding:7px 10px;font-size:13px;margin-left:auto;color:${state.editFolder?'#e8e6f0':'#6b6b8a'}" 
          onchange="state.editFolder=this.value">
          <option value="">No folder</option>
          ${flds.map(f=>`<option value="${esc(f)}" ${state.editFolder===f?'selected':''}>${esc(f)}</option>`).join('')}
        </select>
        <button class="btn" style="background:${state.noteShowAttach?'#2a2a38':'#1a1a22'};border:1px solid #2a2a38;color:${state.noteShowAttach?p.accent:'#6b6b8a'};font-size:12px"
          onclick="state.noteShowAttach=!state.noteShowAttach;render()">
          ${icon('paperclip',12,'currentColor')} Attach
        </button>
      </div>
      <input class="editor-title" id="editTitleInput" placeholder="Note title…" value="${esc(state.editTitle)}" 
        oninput="state.editTitle=this.value" style="--accent:${p.accent}"/>
      <textarea class="editor-body" id="editBodyInput" placeholder="Write something…" rows="10"
        oninput="state.editBody=this.value">${esc(state.editBody)}</textarea>
      ${state.noteShowAttach ? `
        <div class="attach-panel">
          <div class="attach-label">Attachments</div>
          <div style="margin-bottom:10px">
            <div class="row" style="margin-bottom:6px">
              <input class="input" placeholder="URL…" value="${esc(state.noteNewLink)}" oninput="state.noteNewLink=this.value"
                onkeydown="if(event.key==='Enter')addNoteLink()" style="flex:2;--accent:${p.accent}"/>
              <input class="input" placeholder="Label (optional)…" value="${esc(state.noteNewLinkLabel)}" oninput="state.noteNewLinkLabel=this.value"
                onkeydown="if(event.key==='Enter')addNoteLink()" style="flex:1;--accent:${p.accent}"/>
              <button class="btn" style="background:${p.accent};padding:0 12px;height:38px" onclick="addNoteLink()">${icon('plus',14,'white')}</button>
            </div>
            ${state.editLinks.map(l=>`
              <div class="attach-row">
                ${icon('link',12,'#6b6b8a')}
                <a href="${l.url.startsWith('http')?l.url:'https://'+l.url}" target="_blank" 
                  style="font-size:13px;color:${p.accent};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.label)}</a>
                <button class="btn-icon" onclick="removeNoteLink('${l.id}')">${icon('x',12,'currentColor')}</button>
              </div>`).join('')}
          </div>
          <button class="btn" style="background:#1a1a22;border:1px solid #2a2a38;color:#9090b0;font-size:12px;margin-bottom:8px"
            onclick="document.getElementById('fileInput').click()">
            ${icon('paperclip',12,'currentColor')} Attach File
          </button>
          <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileAttach(event)"/>
          ${state.editFiles.map(f=>`
            <div class="attach-row">
              ${icon('fileText',12,'#6b6b8a')}
              <a href="${f.data}" download="${esc(f.name)}"
                style="font-size:13px;color:#c0c0d8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</a>
              <span style="font-size:11px;color:#3a3a50;font-family:'DM Mono',monospace">${fmtSize(f.size)}</span>
              <button class="btn-icon" onclick="removeNoteFile('${f.id}')">${icon('x',12,'currentColor')}</button>
            </div>`).join('')}
        </div>` : ''}`;
  } else {
    notesHtml = `
      <div class="notes-layout">
        <div class="folder-sidebar">
          <div class="section-label">Folders</div>
          <div class="folder-row ${state.selectedFolder===null?'active-folder':''}" 
            style="background:${state.selectedFolder===null?p.accentDim:'transparent'};color:${state.selectedFolder===null?p.accent:'#9090b0'};font-weight:${state.selectedFolder===null?600:400};border-color:${state.selectedFolder===null?p.accentBorder:'transparent'}"
            onclick="state.selectedFolder=null;render()">
            ${icon('alignLeft',13,'currentColor')} All
            <span class="folder-count">${nts.length}</span>
          </div>
          ${flds.map(f=>`
            <div class="folder-row" 
              style="background:${state.selectedFolder===f?p.accentDim:'transparent'};color:${state.selectedFolder===f?p.accent:'#9090b0'};font-weight:${state.selectedFolder===f?600:400};border-color:${state.selectedFolder===f?p.accentBorder:'transparent'}"
              onclick="state.selectedFolder='${esc(f)}';render()">
              ${icon(state.selectedFolder===f?'folderOpen':'folder',13,'currentColor')}
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f)}</span>
              <span class="folder-count">${nts.filter(n=>n.folder===f).length}</span>
              <button class="folder-del" onclick="event.stopPropagation();deleteFolder('${esc(f)}')">${icon('x',11,'currentColor')}</button>
            </div>`).join('')}
          ${state.showNewFolder ? `
            <div style="margin-top:6px">
              <input class="input" id="newFolderInput" placeholder="Folder name…" value="${esc(state.newFolderName)}"
                oninput="state.newFolderName=this.value"
                onkeydown="if(event.key==='Enter')addFolder();if(event.key==='Escape'){state.showNewFolder=false;state.newFolderName='';render()}"
                style="font-size:12px;padding:6px 10px;margin-bottom:4px;--accent:${p.accent}"/>
              <div style="display:flex;gap:4px">
                <button class="btn" style="background:${p.accent};font-size:12px;padding:4px 10px;flex:1" onclick="addFolder()">Add</button>
                <button style="background:#1a1a22;border:1px solid #2a2a38;color:#6b6b8a;border-radius:6px;padding:4px 8px"
                  onclick="state.showNewFolder=false;state.newFolderName='';render()">${icon('x',11,'currentColor')}</button>
              </div>
            </div>` : `
            <button style="display:flex;align-items:center;gap:6px;background:none;border:none;color:#5a5a78;font-size:12px;padding:7px 10px;margin-top:4px;border-radius:8px;width:100%"
              onmouseover="this.style.color='${p.accent}'" onmouseout="this.style.color='#5a5a78'"
              onclick="state.showNewFolder=true;render()">
              ${icon('plus',12,'currentColor')} New Folder
            </button>`}
        </div>
        <div style="flex:1">
          <button class="btn" style="background:${p.accent};margin-bottom:14px" onclick="newNote()">
            ${icon('plus',14,'white')} New Note
          </button>
          ${visibleNotes.length===0?`<div class="empty-state">${icon('fileText',28,'#2e2e40')}<p>${state.selectedFolder?`No notes in "${state.selectedFolder}".`:`No notes yet for ${p.label}.`}</p></div>`:''}
          ${visibleNotes.map(n=>`
            <div class="note-card" style="border-left-color:${p.accentBorder}" onclick="openNote('${n.id}')">
              <div style="overflow:hidden;flex:1">
                <div class="note-title">${esc(n.title||'Untitled')}</div>
                <div class="note-preview">
                  <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px">
                    ${n.body?esc(n.body.slice(0,45))+(n.body.length>45?'…':''):'Empty'}
                  </span>
                  ${n.folder?`<span style="color:${p.accent};opacity:0.7;flex-shrink:0">${esc(n.folder)}</span>`:''}
                  ${(n.links?.length||n.files?.length)?`<span style="display:flex;align-items:center;gap:4px;flex-shrink:0">
                    ${n.links?.length?`${icon('link',10,'currentColor')}${n.links.length}`:''}
                    ${n.files?.length?`${icon('paperclip',10,'currentColor')}${n.files.length}`:''}
                  </span>`:''}
                </div>
              </div>
              <button class="btn-icon" onclick="event.stopPropagation();deleteNote('${n.id}')">${icon('trash',13,'currentColor')}</button>
            </div>`).join('')}
        </div>
      </div>`;
  }

  // ── Calendar tab ──
  const calendarHtml = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button style="background:#13131a;border:1px solid #2a2a38;color:#e8e6f0;border-radius:8px;padding:6px 10px" onclick="prevMonth()">
        ${icon('chevronLeft',16,'#e8e6f0')}</button>
      <h2 style="font-size:16px;font-weight:600">${MONTHS[state.calMonth]} ${state.calYear}</h2>
      <button style="background:#13131a;border:1px solid #2a2a38;color:#e8e6f0;border-radius:8px;padding:6px 10px" onclick="nextMonth()">
        ${icon('chevronRight',16,'#e8e6f0')}</button>
    </div>
    <div class="cal-grid" style="margin-bottom:6px">
      ${DAYS.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">
      ${calGrid.map(day => {
        if (!day) return `<div class="cal-cell empty"></div>`;
        const dayEvts = eventsForDay(day);
        const tod = isToday(day);
        return `<div class="cal-cell ${tod?'today':''}" 
          style="${tod?`background:${p.accentDim};border-color:${p.accentBorder}`:''}"
          onclick="openEventModal(${day})">
          <div class="cal-num ${tod?'today':''}" style="${tod?`color:${p.accent}`:''}">${day}</div>
          ${dayEvts.slice(0,2).map(e=>`
            <div class="cal-ev-pill" style="background:${p.accentDim};color:${p.accent}">${esc(e.text)}</div>
          `).join('')}
          ${dayEvts.length>2?`<div style="font-size:10px;color:#3a3a50">+${dayEvts.length-2}</div>`:''}
        </div>`;
      }).join('')}
    </div>

    <div style="margin-top:30px">
      <div class="section-label">All Events</div>
      ${evts.length===0?`<div class="empty-state">${icon('calendar',26,'#2e2e40')}<p>No events yet. Click any day to add one.</p></div>`:''}
      ${upcoming.length>0?`
        <div style="margin-bottom:20px">
          <div style="font-size:11px;color:${p.accent};font-family:'DM Mono',monospace;margin-bottom:8px;opacity:0.8">Upcoming</div>
          ${upcoming.map(e=>evtListItem(e,p)).join('')}
        </div>`:''}
      ${past.length>0?`
        <div style="opacity:0.5">
          <div style="font-size:11px;color:#5a5a78;font-family:'DM Mono',monospace;margin-bottom:8px">Past</div>
          ${[...past].reverse().map(e=>evtListItem(e,p)).join('')}
        </div>`:''}
    </div>`;

  // ── Event modal ──
  const modalHtml = state.showEventModal && state.selectedDay ? `
    <div class="modal-overlay" onclick="closeEventModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-hdr">
          <h3 style="font-size:15px;font-weight:600">${MONTHS[state.calMonth]} ${state.selectedDay}, ${state.calYear}</h3>
          <button onclick="closeEventModal()" style="background:none;border:none;color:#6b6b8a">${icon('x',16,'#6b6b8a')}</button>
        </div>
        ${eventsForDay(state.selectedDay).map(ev=>`
          <div class="ev-card">
            <div class="ev-card-top">
              <span style="font-size:13px;font-weight:500;flex:1">${esc(ev.text)}</span>
              <button class="btn-icon" onclick="deleteCalEvent('${ev.id}')">${icon('x',12,'currentColor')}</button>
            </div>
            ${ev.address?`<a href="https://maps.google.com/?q=${encodeURIComponent(ev.address)}" target="_blank"
              class="ev-meta" onmouseover="this.style.color='${p.accent}'" onmouseout="this.style.color='#6b6b8a'">
              ${icon('mapPin',11,'currentColor')} ${esc(ev.address)}</a>`:''}
            ${ev.url?`<a href="${ev.url.startsWith('http')?ev.url:'https://'+ev.url}" target="_blank"
              class="ev-meta" onmouseover="this.style.color='${p.accent}'" onmouseout="this.style.color='#6b6b8a'">
              ${icon('externalLink',11,'currentColor')} ${esc(ev.url.length>45?ev.url.slice(0,45)+'…':ev.url)}</a>`:''}
          </div>`).join('')}
        <div style="display:flex;flex-direction:column;gap:6px">
          <div style="display:flex;gap:8px">
            <input class="input flex1" id="evtTextInput" placeholder="Event name…" value="${esc(state.evtText)}"
              oninput="state.evtText=this.value" onkeydown="if(event.key==='Enter')submitEvent()" style="--accent:${p.accent}" autofocus/>
            <button style="background:${state.evtShowExtra?'#2a2a38':'#1a1a22'};border:1px solid #2a2a38;color:${state.evtShowExtra?p.accent:'#6b6b8a'};border-radius:8px;padding:0 10px;font-size:12px;white-space:nowrap"
              onclick="state.evtShowExtra=!state.evtShowExtra;render()">+ Details</button>
          </div>
          ${state.evtShowExtra?`
            <div style="display:flex;align-items:center;gap:8px">
              ${icon('mapPin',13,'#6b6b8a')}
              <input class="input flex1" placeholder="Address (opens in Maps)…" value="${esc(state.evtAddress)}"
                oninput="state.evtAddress=this.value" style="--accent:${p.accent}"/>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              ${icon('link',13,'#6b6b8a')}
              <input class="input flex1" placeholder="URL (e.g. zoom link, website)…" value="${esc(state.evtUrl)}"
                oninput="state.evtUrl=this.value" style="--accent:${p.accent}"/>
            </div>`:''}
          <button class="btn" style="background:${p.accent};width:100%;justify-content:center;margin-top:2px" onclick="submitEvent()">
            Add Event
          </button>
        </div>
      </div>
    </div>` : '';

  // ── Assemble ──
  document.getElementById('app').innerHTML = `
    <div class="app" style="background:${p.bg}">
      <div class="header">
        <div class="header-top">
          <div style="position:relative">
            <button class="profile-btn" style="border-color:${p.accentBorder}" onclick="toggleProfileMenu()">
              ${icon(p.icon,14,p.accent)}
              <span style="color:${p.accent}">${p.label}</span>
              <span style="display:inline-flex;transition:transform 0.2s;transform:${state.showProfileMenu?'rotate(180deg)':'rotate(0)'}">
                ${icon('chevronDown',12,'#6b6b8a')}
              </span>
            </button>
            ${profileMenuHtml}
          </div>
          <span class="date-label">${today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>
        </div>
        ${tabsHtml}
      </div>
      <div class="backdrop ${state.showProfileMenu?'open':''}" onclick="state.showProfileMenu=false;render()"></div>
      <div class="content">
        <div class="tab-content ${state.tab==='todos'?'active':''}">${todosHtml}</div>
        <div class="tab-content ${state.tab==='notes'?'active':''}">${notesHtml}</div>
        <div class="tab-content ${state.tab==='calendar'?'active':''}">${calendarHtml}</div>
      </div>
      ${modalHtml}
    </div>`;

  // Focus inputs after render
  if (state.tab==='todos') { const el=document.getElementById('newTodoInput'); if(el&&document.activeElement!==el){} }
  if (state.editingNote) {
    const tb=document.getElementById('editBodyInput');
    if(tb) tb.value=state.editBody;
  }
  if (state.showNewFolder) { setTimeout(()=>{const el=document.getElementById('newFolderInput');if(el)el.focus();},10); }
  if (state.showEventModal) { setTimeout(()=>{const el=document.getElementById('evtTextInput');if(el)el.focus();},10); }
}

function evtListItem(ev, p) {
  return `<div class="ev-list-item">
    <div class="ev-list-top">
      <span class="ev-date" style="color:${p.accent}">${MONTHS[ev.month].slice(0,3)} ${ev.day}, ${ev.year}</span>
      <span style="font-size:14px;flex:1">${esc(ev.text)}</span>
      <button class="btn-icon" onclick="deleteCalEvent('${ev.id}')">${icon('x',13,'currentColor')}</button>
    </div>
    ${ev.address?`<a href="https://maps.google.com/?q=${encodeURIComponent(ev.address)}" target="_blank"
      class="ev-list-meta" onmouseover="this.style.color='${p.accent}'" onmouseout="this.style.color='#6b6b8a'">
      ${icon('mapPin',10,'currentColor')} ${esc(ev.address)}</a>`:''}
    ${ev.url?`<a href="${ev.url.startsWith('http')?ev.url:'https://'+ev.url}" target="_blank"
      class="ev-list-meta" onmouseover="this.style.color='${p.accent}'" onmouseout="this.style.color='#6b6b8a'">
      ${icon('externalLink',10,'currentColor')} ${esc(ev.url.length>50?ev.url.slice(0,50)+'…':ev.url)}</a>`:''}
  </div>`;
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtSize(b) { return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB'; }

// ─── Actions ──────────────────────────────────────────────────────────────────
function switchProfile(id) {
  state.profileId = id; save('db_activeProfile', id);
  state.tab='todos'; state.showProfileMenu=false; state.editingNote=null;
  state.newTodo=''; state.selectedFolder=null; render();
}
function toggleProfileMenu() { state.showProfileMenu=!state.showProfileMenu; render(); }
function setTab(t) { state.tab=t; state.editingNote=null; render(); }

// Todos
function addTodo() {
  const text=state.newTodo.trim(); if(!text) return;
  const tds=todos();
  tds.unshift({id:Date.now().toString(),text,done:false,priority:state.todoPriority,created:new Date().toISOString()});
  setTodos(tds); state.newTodo=''; render();
  setTimeout(()=>{const el=document.getElementById('newTodoInput');if(el)el.focus();},10);
}
function toggleTodo(id) { const tds=todos(); const t=tds.find(x=>x.id===id); if(t)t.done=!t.done; setTodos(tds); render(); }
function deleteTodo(id) { setTodos(todos().filter(t=>t.id!==id)); render(); }

// Notes
function newNote() {
  const n={id:Date.now().toString(),title:'Untitled',body:'',folder:state.selectedFolder||'',links:[],files:[],updated:new Date().toISOString()};
  const nts=notes(); nts.unshift(n); setNotes(nts);
  state.editingNote=n; state.editTitle=n.title; state.editBody=n.body;
  state.editFolder=n.folder||''; state.editLinks=[]; state.editFiles=[]; state.noteShowAttach=false; render();
}
function openNote(id) {
  const n=notes().find(x=>x.id===id); if(!n) return;
  state.editingNote=n; state.editTitle=n.title; state.editBody=n.body;
  state.editFolder=n.folder||''; state.editLinks=n.links||[]; state.editFiles=n.files||[]; state.noteShowAttach=false; render();
}
function saveNote() {
  const nts=notes();
  const idx=nts.findIndex(x=>x.id===state.editingNote.id);
  if(idx>-1) nts[idx]={...nts[idx],title:state.editTitle||'Untitled',body:state.editBody,folder:state.editFolder,links:state.editLinks,files:state.editFiles,updated:new Date().toISOString()};
  setNotes(nts); state.editingNote=null; state.noteShowAttach=false; render();
}
function cancelEdit() { state.editingNote=null; state.noteShowAttach=false; render(); }
function deleteNote(id) { setNotes(notes().filter(n=>n.id!==id)); if(state.editingNote?.id===id)state.editingNote=null; render(); }
function addFolder() {
  const name=state.newFolderName.trim(); if(!name) return;
  const flds=folders(); if(flds.includes(name)) return;
  flds.push(name); setFolders(flds); state.newFolderName=''; state.showNewFolder=false; render();
}
function deleteFolder(name) {
  setFolders(folders().filter(f=>f!==name));
  setNotes(notes().map(n=>n.folder===name?{...n,folder:''}:n));
  if(state.selectedFolder===name)state.selectedFolder=null; render();
}
function addNoteLink() {
  if(!state.noteNewLink.trim()) return;
  state.editLinks.push({id:Date.now().toString(),label:state.noteNewLinkLabel.trim()||state.noteNewLink.trim(),url:state.noteNewLink.trim()});
  state.noteNewLink=''; state.noteNewLinkLabel=''; render();
}
function removeNoteLink(id) { state.editLinks=state.editLinks.filter(l=>l.id!==id); render(); }
function removeNoteFile(id) { state.editFiles=state.editFiles.filter(f=>f.id!==id); render(); }
function handleFileAttach(e) {
  Array.from(e.target.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      state.editFiles.push({id:(Date.now()+Math.random()).toString(),name:file.name,size:file.size,type:file.type,data:ev.target.result});
      render();
    };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

// Calendar
function prevMonth() { if(state.calMonth===0){state.calMonth=11;state.calYear--;}else state.calMonth--; render(); }
function nextMonth() { if(state.calMonth===11){state.calMonth=0;state.calYear++;}else state.calMonth++; render(); }
function openEventModal(day) { state.selectedDay=day; state.showEventModal=true; state.evtText=''; state.evtAddress=''; state.evtUrl=''; state.evtShowExtra=false; render(); }
function closeEventModal() { state.showEventModal=false; state.selectedDay=null; render(); }
function submitEvent() {
  if(!state.evtText.trim()) return;
  const evts=calEvents();
  evts.push({id:Date.now().toString(),day:state.selectedDay,month:state.calMonth,year:state.calYear,text:state.evtText.trim(),address:state.evtAddress.trim(),url:state.evtUrl.trim()});
  setCalEvents(evts); state.evtText=''; state.evtAddress=''; state.evtUrl=''; state.evtShowExtra=false; render();
}
function deleteCalEvent(id) { setCalEvents(calEvents().filter(e=>e.id!==id)); render(); }

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
