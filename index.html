<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#090f0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DAN v1"/>
  <title>DAN v1</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      background: #090f0b;
      color: #e8e6f0;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }
    /* CRITICAL: prevent iOS zoom on focus — all inputs must be >= 16px */
    input, textarea, select { font-family: 'Sora', sans-serif; font-size: 16px; }
    button { font-family: 'Sora', sans-serif; font-size: 14px; cursor: pointer; }
    a { text-decoration: none; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 2px; }

    .app { min-height: 100vh; transition: background 0.3s; }
    .header { padding: 12px 14px 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .content { padding: 14px 14px 90px; }

    /* Profile */
    .profile-btn { display: flex; align-items: center; gap: 6px; background: #13131a; border-radius: 9px; padding: 6px 11px; border: 1px solid #2a2a38; }
    .profile-btn .plabel { font-size: 13px; font-weight: 600; }
    .profile-menu { position: absolute; top: calc(100% + 6px); left: 0; background: #14141c; border: 1px solid #2a2a38; border-radius: 12px; overflow: hidden; z-index: 50; min-width: 175px; box-shadow: 0 12px 40px rgba(0,0,0,0.65); display: none; }
    .profile-menu.open { display: block; }
    .profile-option { display: flex; align-items: center; gap: 8px; width: 100%; padding: 11px 13px; background: transparent; border: none; color: #9090b0; font-size: 13px; font-weight: 400; border-left: 3px solid transparent; text-align: left; }
    .profile-option.active { background: #1c1c28; font-weight: 600; }
    .profile-option .ab { margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace; opacity: 0.7; }
    .backdrop { position: fixed; inset: 0; z-index: 40; display: none; }
    .backdrop.open { display: block; }

    /* Tabs */
    .tabs { display: flex; border-bottom: 1px solid #1c1c28; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn { display: flex; align-items: center; gap: 4px; flex-shrink: 0; padding: 8px 12px; font-size: 12px; font-weight: 500; color: #6b6b8a; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; }
    .tab-btn.active { border-bottom-color: currentColor; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Form elements */
    .input { background: #1a1a22; border: 1px solid #2a2a38; color: #e8e6f0; border-radius: 8px; padding: 8px 11px; font-size: 16px; outline: none; transition: border-color 0.2s; width: 100%; }
    .input:focus { border-color: var(--accent, #22c55e); }
    .input::placeholder { color: #3a3a50; }
    .btn { border: none; color: white; padding: 7px 13px; border-radius: 8px; font-size: 13px; font-weight: 500; transition: filter 0.15s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap; }
    .btn:active { filter: brightness(0.85); }
    .btn-ghost { background: none; border: 1px solid #2a2a38; color: #6b6b8a; padding: 6px 11px; border-radius: 8px; font-size: 13px; }
    .btn-icon { background: none; border: none; color: #2e2e40; padding: 4px; transition: color 0.15s; display: inline-flex; align-items: center; }
    .btn-icon:active { color: #ef4444; }

    /* Todos */
    .todo-row { display: flex; align-items: center; gap: 9px; padding: 10px 11px; background: #13131a; border-radius: 9px; border: 1px solid #1c1c28; margin-bottom: 6px; animation: slideIn 0.15s ease; }
    .todo-row.done { opacity: 0.4; }
    .todo-check { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #3a3a50; background: transparent; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .todo-check.checked { border: none; }
    .todo-text { flex: 1; font-size: 14px; word-break: break-word; }
    .todo-text.done { text-decoration: line-through; color: #3a3a50; }
    .pri-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

    /* Notes */
    .notes-layout { display: flex; gap: 10px; }
    .folder-sidebar { width: 120px; flex-shrink: 0; }
    .note-card { display: flex; align-items: center; padding: 10px 11px; background: #13131a; border-radius: 9px; border: 1px solid #1c1c28; border-left: 3px solid; cursor: pointer; margin-bottom: 6px; }
    .note-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .note-preview { font-size: 11px; color: #3a3a50; font-family: 'DM Mono', monospace; display: flex; gap: 6px; align-items: center; }
    .folder-row { display: flex; align-items: center; gap: 5px; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 2px; border: 1px solid transparent; position: relative; }
    .folder-count { margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace; opacity: 0.6; }
    .folder-del { position: absolute; right: 3px; background: none; border: none; color: transparent; padding: 2px; cursor: pointer; }
    .folder-row:hover .folder-del, .folder-row:active .folder-del { color: #ef4444; }
    .editor-title { width: 100%; background: transparent; border: none; border-bottom: 1px solid #2a2a38; color: #e8e6f0; font-size: 18px; font-weight: 600; padding: 0 0 8px; outline: none; font-family: inherit; margin-bottom: 10px; }
    .editor-body { width: 100%; background: transparent; border: none; color: #e8e6f0; font-size: 16px; line-height: 1.7; outline: none; font-family: inherit; resize: vertical; padding: 0; min-height: 140px; }
    .attach-panel { margin-top: 12px; padding: 11px; background: #13131a; border-radius: 9px; border: 1px solid #1c1c28; }
    .attach-label { font-size: 10px; color: #6b6b8a; margin-bottom: 8px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
    .attach-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; overflow: hidden; }

    /* Calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-day-hdr { text-align: center; font-size: 10px; font-family: 'DM Mono', monospace; color: #3a3a50; padding: 3px 0; }
    .cal-cell { min-height: 46px; padding: 4px 3px; border-radius: 6px; background: #13131a; border: 1px solid #1a1a22; cursor: pointer; }
    .cal-cell:active { background: #1e1e2a; }
    .cal-cell.empty { background: transparent; border: none; cursor: default; }
    .cal-num { font-size: 11px; text-align: right; margin-bottom: 2px; color: #909090; }
    .cal-num.today { font-weight: 700; }
    .cal-ev-pill { font-size: 9px; border-radius: 3px; padding: 1px 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 1px; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal { background: #17171f; border: 1px solid #2a2a38; border-radius: 18px 18px 0 0; padding: 18px 16px 34px; width: 100%; max-height: 88vh; overflow-y: auto; }
    .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 13px; }
    .ev-card { background: #0f0f13; border-radius: 8px; padding: 9px 10px; margin-bottom: 6px; }
    .ev-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 7px; }
    .ev-meta { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6b6b8a; margin-top: 4px; }
    .ev-meta:hover { color: var(--accent, #22c55e); }
    .ev-list-item { padding: 9px 11px; background: #13131a; border-radius: 8px; border: 1px solid #1c1c28; margin-bottom: 6px; }
    .ev-list-top { display: flex; align-items: flex-start; gap: 7px; }
    .ev-date { font-family: 'DM Mono', monospace; font-size: 11px; min-width: 75px; flex-shrink: 0; padding-top: 1px; }
    .ev-list-meta { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #6b6b8a; margin-top: 4px; margin-left: 82px; }

    /* Links */
    .link-card { display: flex; align-items: flex-start; gap: 9px; padding: 10px 11px; background: #13131a; border-radius: 9px; border: 1px solid #1c1c28; border-left: 3px solid; animation: slideIn 0.15s ease; margin-bottom: 6px; cursor: pointer; }
    .link-card:active { background: #1a1a24; }
    .link-favicon { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; background: #2a2a38; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 1px; }
    .link-domain { font-family: 'DM Mono', monospace; font-size: 10px; color: #5a5a78; margin-bottom: 2px; }
    .link-title { font-size: 13px; font-weight: 500; line-height: 1.3; word-break: break-word; }
    .link-note { font-size: 11px; color: #6b6b8a; margin-top: 3px; }
    .cat-group-hdr { font-size: 10px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 7px; display: flex; align-items: center; gap: 5px; }
    .cat-pill { font-size: 10px; padding: 3px 7px; border-radius: 5px; font-family: 'DM Mono', monospace; cursor: pointer; }
    .link-paste-area { width: 100%; min-height: 40px; background: #1a1a22; border: 1px dashed #2a2a38; border-radius: 8px; padding: 9px 11px; font-size: 16px; color: #e8e6f0; outline: none; font-family: 'Sora', sans-serif; resize: none; transition: border-color 0.2s; }
    .link-paste-area:focus { border-color: var(--accent, #22c55e); border-style: solid; }
    .link-paste-area::placeholder { color: #3a3a50; }

    .date-label { font-size: 11px; color: #5a5a78; font-family: 'DM Mono', monospace; }
    .section-label { font-size: 10px; font-family: 'DM Mono', monospace; color: #5a5a78; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; }
    .row { display: flex; gap: 6px; align-items: center; }
    .flex1 { flex: 1; min-width: 0; }
    .empty-state { text-align: center; padding: 44px 0 26px; color: #2e2e40; }
    .empty-state p { font-size: 13px; margin-top: 9px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const ICO = {
  user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  rocket:'<path d="M4.5 16.5c-1.5 1-1.5 2.5 0 5 .5.5 2.5 1.5 4 0 0-1.5-2-3-4-5z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  briefcase:'<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
  chevronDown:'<polyline points="6 9 12 15 18 9"/>',
  chevronLeft:'<polyline points="15 18 9 12 15 6"/>',
  chevronRight:'<polyline points="9 18 15 12 9 6"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  check:'<polyline points="20 6 9 12 4 8"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
  fileText:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
  checkSquare:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  link2:'<path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/><line x1="8" y1="12" x2="16" y2="12"/>',
  link:'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
  folder:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  folderOpen:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="2 10 22 10"/>',
  alignLeft:'<line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/>',
  paperclip:'<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
  mapPin:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  extLink:'<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  globe:'<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
};
function ic(n,s=16,c='currentColor'){return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICO[n]||''}</svg>`;}

const PROFILES=[
  {id:'personal',    label:'Personal',    icon:'user',      accent:'#22c55e', dim:'rgba(34,197,94,0.08)',   bdr:'rgba(34,197,94,0.25)',   bg:'#090f0b'},
  {id:'ventures',    label:'Ventures',    icon:'rocket',    accent:'#eab308', dim:'rgba(234,179,8,0.08)',   bdr:'rgba(234,179,8,0.25)',   bg:'#0f0e06'},
  {id:'professional',label:'Professional',icon:'star',      accent:'#3b82f6', dim:'rgba(59,130,246,0.08)',  bdr:'rgba(59,130,246,0.25)',  bg:'#07090f'},
  {id:'work',        label:'Work',        icon:'briefcase', accent:'#ef4444', dim:'rgba(239,68,68,0.08)',   bdr:'rgba(239,68,68,0.25)',   bg:'#0f0707'},
];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CATS=[
  {id:'youtube', label:'YouTube',  color:'#ef4444', match:u=>u.includes('youtube.com')||u.includes('youtu.be')},
  {id:'article', label:'Article',  color:'#f59e0b', match:u=>/medium\.com|substack\.com|blog|news|post|article/.test(u)},
  {id:'docs',    label:'Docs',     color:'#3b82f6', match:u=>/docs\.|notion\.so|coda\.io|confluence|readme\.io|gitbook/.test(u)},
  {id:'github',  label:'GitHub',   color:'#a78bfa', match:u=>u.includes('github.com')||u.includes('gitlab.com')},
  {id:'tool',    label:'Tool',     color:'#22c55e', match:u=>/app\.|dashboard|figma\.com|linear\.app|airtable|vercel|netlify|supabase|railway/.test(u)},
  {id:'social',  label:'Social',   color:'#ec4899', match:u=>/twitter\.com|x\.com|instagram\.com|linkedin\.com|threads\.net|reddit\.com|tiktok\.com/.test(u)},
  {id:'shop',    label:'Shopping', color:'#f97316', match:u=>/amazon\.com|ebay\.com|shop|store|shopify/.test(u)},
  {id:'ref',     label:'Reference',color:'#6ee7b7', match:u=>/wikipedia|wiki|stackoverflow|stackexchange|mdn|developer\.mozilla/.test(u)},
  {id:'other',   label:'Other',    color:'#9090b0', match:()=>true},
];
function catFor(url){try{url=url.toLowerCase();}catch(e){}return CATS.find(c=>c.match(url))||CATS[CATS.length-1];}
function domain(url){try{const u=url.startsWith('http')?url:'https://'+url;return new URL(u).hostname.replace(/^www\./,'');}catch{return url;}}

function ld(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}
function pk(pid,k){return `db_${pid}_${k}`;}

let S={
  profileId:ld('db_activeProfile','personal'), tab:'todos', showMenu:false,
  newTodo:'', todoPri:'medium',
  editNote:null, selFolder:null, showNewFolder:false, newFolderName:'',
  showAttach:false, editTitle:'', editBody:'', editFolder:'', editLinks:[], editFiles:[],
  noteLink:'', noteLinkLabel:'',
  calMonth:new Date().getMonth(), calYear:new Date().getFullYear(),
  selDay:null, showEvtModal:false, evtText:'', evtAddr:'', evtUrl:'', evtExtra:false,
  linkInput:'', linkNote:'', linkFilter:null,
  editingLink:null, elLabel:'', elNote:'', elCat:'',
};
const pid=()=>S.profileId;
const P=()=>PROFILES.find(p=>p.id===pid());
const todos=()=>ld(pk(pid(),'todos'),[]);
const notes=()=>ld(pk(pid(),'notes'),[]);
const cevts=()=>ld(pk(pid(),'calevents'),[]);
const folds=()=>ld(pk(pid(),'folders'),[]);
const links=()=>ld(pk(pid(),'links'),[]);
const sTodos=v=>sv(pk(pid(),'todos'),v);
const sNotes=v=>sv(pk(pid(),'notes'),v);
const sCevts=v=>sv(pk(pid(),'calevents'),v);
const sFolds=v=>sv(pk(pid(),'folders'),v);
const sLinks=v=>sv(pk(pid(),'links'),v);

function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtSz(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}

function render(){
  const p=P(), today=new Date();
  document.body.style.background=p.bg;
  document.documentElement.style.setProperty('--accent',p.accent);
  const todayMs=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  const tds=todos(), nts=notes(), evts=cevts(), fls=folds(), lks=links();

  // Profile menu
  const pmHtml=`<div class="profile-menu ${S.showMenu?'open':''}" id="pm">
    ${PROFILES.map(pr=>`<button class="profile-option ${pr.id===pid()?'active':''}"
      style="color:${pr.id===pid()?pr.accent:'#9090b0'};border-left-color:${pr.id===pid()?pr.accent:'transparent'}"
      onclick="switchProfile('${pr.id}')">
      ${ic(pr.icon,13,pr.id===pid()?pr.accent:'#5a5a78')} ${pr.label}
      ${pr.id===pid()?`<span class="ab" style="color:${pr.accent}">active</span>`:''}
    </button>`).join('')}
  </div>`;

  // Tabs
  const TABS=[{id:'todos',l:'To-Do',i:'checkSquare'},{id:'notes',l:'Notes',i:'fileText'},{id:'calendar',l:'Calendar',i:'calendar'},{id:'links',l:'Links',i:'link2'}];
  const tabsHtml=`<div class="tabs">${TABS.map(t=>`<button class="tab-btn ${S.tab===t.id?'active':''}" style="color:${S.tab===t.id?p.accent:'#6b6b8a'}" onclick="setTab('${t.id}')">${ic(t.i,13,S.tab===t.id?p.accent:'#6b6b8a')} ${t.l}</button>`).join('')}</div>`;

  // Todos
  const PC={high:'#ef4444',medium:'#f59e0b',low:'#6ee7b7'}, PL={high:'High',medium:'Med',low:'Low'};
  const todosHtml=`
    <div class="row" style="margin-bottom:14px">

      <select class="input" style="width:auto;padding:8px 10px;flex-shrink:0" onchange="S.todoPri=this.value">
        ${['high','medium','low'].map(v=>`<option value="${v}" ${S.todoPri===v?'selected':''}>${PL[v]}</option>`).join('')}
      </select>
      <button class="btn" style="background:${p.accent};padding:0 13px;height:39px;flex-shrink:0" onclick="addTodo()">${ic('plus',15,'white')}</button>
    </div>
    ${tds.length?`<div style="font-size:16px;color:#5a5a78;font-family:'DM Mono',monospace;margin-bottom:14px;display:flex;gap:12px"><span>${tds.filter(t=>!t.done).length} remaining</span><span>·</span><span>${tds.filter(t=>t.done).length} done</span></div>`:''}
    ${!tds.length?`<div class="empty-state">${ic('checkSquare',26,'#2e2e40')}<p>No tasks yet.</p></div>`:''}
    ${tds.map(t=>`<div class="todo-row ${t.done?'done':''}">
      <button class="todo-check ${t.done?'checked':''}" style="${t.done?`background:${p.accent};`:''}border-color:#3a3a50" onclick="toggleTodo('${t.id}')">${t.done?ic('check',11,'white'):''}</button>
      <span class="todo-text ${t.done?'done':''}">${esc(t.text)}</span>
      <span class="pri-badge" style="background:${PC[t.priority]}18;color:${PC[t.priority]}">${PL[t.priority]}</span>
      <button class="btn-icon" onclick="deleteTodo('${t.id}')">${ic('trash',13)}</button>
    </div>`).join('')}`;

  // Notes
  const visNotes=S.selFolder===null?nts:nts.filter(n=>(n.folder||'')===S.selFolder);
  let notesHtml='';
  if(S.editNote){
    notesHtml=`
      <div class="row" style="margin-bottom:12px;flex-wrap:wrap;gap:6px">

        <button class="btn-ghost" onclick="cancelEdit()">Cancel</button>
        <select class="input" style="width:auto;padding:7px 10px;font-size:16px;margin-left:auto;color:${S.editFolder?'#e8e6f0':'#6b6b8a'}" onchange="S.editFolder=this.value">
          <option value="">No folder</option>
          ${fls.map(f=>`<option value="${esc(f)}" ${S.editFolder===f?'selected':''}>${esc(f)}</option>`).join('')}
        </select>
        <button class="btn" style="background:${S.showAttach?'#2a2a38':'#1a1a22'};border:1px solid #2a2a38;color:${S.showAttach?p.accent:'#6b6b8a'};font-size:16px" onclick="S.showAttach=!S.showAttach;render()">${ic('paperclip',12)} Attach</button>
      </div>
      <input class="editor-title" id="editTitleInput" placeholder="Note title…" value="${esc(S.editTitle)}" oninput="S.editTitle=this.value"/>
      <textarea class="editor-body" id="editBodyInput" placeholder="Write something…" rows="9" oninput="S.editBody=this.value">${esc(S.editBody)}</textarea>
      ${S.showAttach?`<div class="attach-panel">
        <div class="attach-label">Attachments</div>
        <div class="row" style="margin-bottom:6px">
          <input class="input" placeholder="URL…" value="${esc(S.noteLink)}" oninput="S.noteLink=this.value" onkeydown="if(event.key==='Enter')addNoteLink()" style="flex:2"/>
          <input class="input" placeholder="Label…" value="${esc(S.noteLinkLabel)}" oninput="S.noteLinkLabel=this.value" onkeydown="if(event.key==='Enter')addNoteLink()" style="flex:1"/>
          <button class="btn" style="background:${p.accent};padding:0 11px;height:38px;flex-shrink:0" onclick="addNoteLink()">${ic('plus',13,'white')}</button>
        </div>
        ${S.editLinks.map(l=>`<div class="attach-row">${ic('link',11,'#6b6b8a')}<a href="${l.url.startsWith('http')?l.url:'https://'+l.url}" target="_blank" style="font-size:16px;color:${p.accent};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l.label)}</a><button class="btn-icon" onclick="removeNoteLink('${l.id}')">${ic('x',11)}</button></div>`).join('')}
        <button class="btn" style="background:#1a1a22;border:1px solid #2a2a38;color:#9090b0;font-size:16px;margin:8px 0 6px" onclick="document.getElementById('fileInput').click()">${ic('paperclip',12)} Attach File</button>
        <input type="file" id="fileInput" multiple style="display:none" onchange="handleFileAttach(event)"/>
        ${S.editFiles.map(f=>`<div class="attach-row">${ic('fileText',11,'#6b6b8a')}<a href="${f.data}" download="${esc(f.name)}" style="font-size:16px;color:#c0c0d8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</a><span style="font-size:16px;color:#3a3a50;font-family:'DM Mono',monospace;flex-shrink:0">${fmtSz(f.size)}</span><button class="btn-icon" onclick="removeNoteFile('${f.id}')">${ic('x',11)}</button></div>`).join('')}
      </div>`:''}`;
  } else {
    notesHtml=`<div class="notes-layout">
      <div class="folder-sidebar">
        <div class="section-label">Folders</div>
        <div class="folder-row" onclick="S.selFolder=null;render()" style="background:${S.selFolder===null?p.dim:'transparent'};color:${S.selFolder===null?p.accent:'#9090b0'};font-weight:${S.selFolder===null?600:400};border-color:${S.selFolder===null?p.bdr:'transparent'}">${ic('alignLeft',12,'currentColor')} All<span class="folder-count">${nts.length}</span></div>
        ${fls.map(f=>`<div class="folder-row" onclick="S.selFolder='${esc(f)}';render()" style="background:${S.selFolder===f?p.dim:'transparent'};color:${S.selFolder===f?p.accent:'#9090b0'};font-weight:${S.selFolder===f?600:400};border-color:${S.selFolder===f?p.bdr:'transparent'}">${ic(S.selFolder===f?'folderOpen':'folder',12,'currentColor')}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f)}</span><span class="folder-count">${nts.filter(n=>n.folder===f).length}</span><button class="folder-del" onclick="event.stopPropagation();deleteFolder('${esc(f)}')">${ic('x',10,'currentColor')}</button></div>`).join('')}
        ${S.showNewFolder?`<div style="margin-top:6px"><input class="input" id="nfi" placeholder="Name…" value="${esc(S.newFolderName)}" oninput="S.newFolderName=this.value" onkeydown="if(event.key==='Enter')addFolder();if(event.key==='Escape'){S.showNewFolder=false;S.newFolderName='';render()}" style="font-size:16px;padding:6px 9px;margin-bottom:4px"/><div style="display:flex;gap:4px"><button class="btn" style="background:${p.accent};font-size:16px;padding:4px 10px;flex:1" onclick="addFolder()">Add</button><button style="background:#1a1a22;border:1px solid #2a2a38;color:#6b6b8a;border-radius:6px;padding:4px 8px;cursor:pointer" onclick="S.showNewFolder=false;S.newFolderName='';render()">${ic('x',11,'currentColor')}</button></div></div>`:`<button style="display:flex;align-items:center;gap:5px;background:none;border:none;color:#5a5a78;font-size:16px;padding:6px 9px;margin-top:2px;border-radius:7px;width:100%;cursor:pointer" onmouseover="this.style.color='${p.accent}'" onmouseout="this.style.color='#5a5a78'" onclick="S.showNewFolder=true;render()">${ic('plus',11,'currentColor')} New Folder</button>`}
      </div>
      <div style="flex:1;min-width:0">
        <button class="btn" style="background:${p.accent};margin-bottom:12px" onclick="newNote()">${ic('plus',13,'white')} New Note</button>
        ${!visNotes.length?`<div class="empty-state">${ic('fileText',26,'#2e2e40')}<p>${S.selFolder?`No notes in "${S.selFolder}".`:'No notes yet.'}</p></div>`:''}
        ${visNotes.map(n=>`<div class="note-card" style="border-left-color:${p.bdr}" onclick="openNote('${n.id}')"><div style="overflow:hidden;flex:1"><div class="note-title">${esc(n.title||'Untitled')}</div><div class="note-preview"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${n.body?esc(n.body.slice(0,40))+(n.body.length>40?'…':''):'Empty'}</span>${n.folder?`<span style="color:${p.accent};opacity:0.7;flex-shrink:0">${esc(n.folder)}</span>`:''}${(n.links?.length||n.files?.length)?`<span style="display:flex;align-items:center;gap:3px;flex-shrink:0">${n.links?.length?`${ic('link',9)}${n.links.length}`:''}${n.files?.length?`${ic('paperclip',9)}${n.files.length}`:''}</span>`:''}</div></div><button class="btn-icon" onclick="event.stopPropagation();deleteNote('${n.id}')">${ic('trash',12)}</button></div>`).join('')}
      </div>
    </div>`;
  }

  // Calendar
  const dim=new Date(S.calYear,S.calMonth+1,0).getDate();
  const fd=new Date(S.calYear,S.calMonth,1).getDay();
  const grid=[]; for(let i=0;i<fd;i++)grid.push(null); for(let d=1;d<=dim;d++)grid.push(d);
  const isTod=d=>d===today.getDate()&&S.calMonth===today.getMonth()&&S.calYear===today.getFullYear();
  const evDay=d=>evts.filter(e=>e.day===d&&e.month===S.calMonth&&e.year===S.calYear);
  const sorted=[...evts].sort((a,b)=>new Date(a.year,a.month,a.day)-new Date(b.year,b.month,b.day));
  const upcoming=sorted.filter(e=>new Date(e.year,e.month,e.day).getTime()>=todayMs);
  const past=sorted.filter(e=>new Date(e.year,e.month,e.day).getTime()<todayMs);
  const calHtml=`
    <div class="row" style="justify-content:space-between;margin-bottom:16px">
      <button style="background:#13131a;border:1px solid #2a2a38;color:#e8e6f0;border-radius:8px;padding:6px 10px;cursor:pointer" onclick="prevMo()">${ic('chevronLeft',15)}</button>
      <h2 style="font-size:16px;font-weight:600">${MONTHS[S.calMonth]} ${S.calYear}</h2>
      <button style="background:#13131a;border:1px solid #2a2a38;color:#e8e6f0;border-radius:8px;padding:6px 10px;cursor:pointer" onclick="nextMo()">${ic('chevronRight',15)}</button>
    </div>
    <div class="cal-grid" style="margin-bottom:4px">${DAYS.map(d=>`<div class="cal-day-hdr">${d}</div>`).join('')}</div>
    <div class="cal-grid">${grid.map(day=>{
      if(!day)return `<div class="cal-cell empty"></div>`;
      const de=evDay(day), tod=isTod(day);
      return `<div class="cal-cell" style="${tod?`background:${p.dim};border-color:${p.bdr}`:''}" onclick="openEvtModal(${day})"><div class="cal-num ${tod?'today':''}" style="${tod?`color:${p.accent}`:''}">  ${day}</div>${de.slice(0,2).map(e=>`<div class="cal-ev-pill" style="background:${p.dim};color:${p.accent}">${esc(e.text)}</div>`).join('')}${de.length>2?`<div style="font-size:16px;color:#3a3a50">+${de.length-2}</div>`:''}</div>`;
    }).join('')}</div>
    <div style="margin-top:26px">
      <div class="section-label">All Events</div>
      ${!evts.length?`<div class="empty-state">${ic('calendar',26,'#2e2e40')}<p>No events yet.<br>Tap any day to add one.</p></div>`:''}
      ${upcoming.length?`<div style="margin-bottom:18px"><div style="font-size:16px;color:${p.accent};font-family:'DM Mono',monospace;margin-bottom:7px;opacity:0.85">Upcoming</div>${upcoming.map(e=>evtRow(e,p)).join('')}</div>`:''}
      ${past.length?`<div style="opacity:0.5"><div style="font-size:16px;color:#5a5a78;font-family:'DM Mono',monospace;margin-bottom:7px">Past</div>${[...past].reverse().map(e=>evtRow(e,p)).join('')}</div>`:''}
    </div>`;

  // Links
  const catCounts={};
  lks.forEach(l=>{catCounts[l.cat]=(catCounts[l.cat]||0)+1;});
  const usedCats=CATS.filter(c=>catCounts[c.id]);
  const filtLks=S.linkFilter?lks.filter(l=>l.cat===S.linkFilter):lks;
  const groups=S.linkFilter
    ?[{cat:CATS.find(c=>c.id===S.linkFilter),items:filtLks}]
    :usedCats.map(c=>({cat:c,items:lks.filter(l=>l.cat===c.id)}));

  const linksHtml=`
    <div style="margin-bottom:14px">
      <div style="font-size:16px;color:#6b6b8a;margin-bottom:8px">Paste a URL to save it:</div>
      <div class="row" style="align-items:flex-start;gap:7px">
        <textarea class="link-paste-area flex1" id="linkInput" rows="2" placeholder="Paste URL here… multiple lines OK" oninput="S.linkInput=this.value"></textarea>
        <button class="btn" style="background:${p.accent};align-self:stretch;padding:0 13px;flex-shrink:0" onclick="addLinks()">${ic('plus',15,'white')}</button>
      </div>
      <input class="input" style="margin-top:6px;font-size:16px" placeholder="Optional note / label…" value="${esc(S.linkNote)}" oninput="S.linkNote=this.value" onkeydown="if(event.key==='Enter')addLinks()"/>
    </div>
    ${lks.length?`<div class="row" style="flex-wrap:wrap;gap:5px;margin-bottom:16px">
      <button class="cat-pill" onclick="S.linkFilter=null;render()" style="background:${!S.linkFilter?p.dim:'#1a1a22'};color:${!S.linkFilter?p.accent:'#6b6b8a'};border:1px solid ${!S.linkFilter?p.bdr:'#2a2a38'}">All (${lks.length})</button>
      ${usedCats.map(c=>`<button class="cat-pill" onclick="S.linkFilter='${c.id}';render()" style="background:${S.linkFilter===c.id?c.color+'22':'#1a1a22'};color:${S.linkFilter===c.id?c.color:'#6b6b8a'};border:1px solid ${S.linkFilter===c.id?c.color+'55':'#2a2a38'}">${c.label} (${catCounts[c.id]})</button>`).join('')}
    </div>`:''}
    ${!lks.length?`<div class="empty-state">${ic('link2',26,'#2e2e40')}<p>No links saved yet.<br>Paste any URL above to get started.</p></div>`:''}
    ${S.editingLink?`<div style="background:#13131a;border:1px solid #2a2a38;border-radius:10px;padding:14px;margin-bottom:14px">
      <div style="font-size:16px;color:#6b6b8a;margin-bottom:8px">Edit link</div>
      <input class="input" placeholder="Label…" value="${esc(S.elLabel)}" oninput="S.elLabel=this.value" style="margin-bottom:6px"/>
      <input class="input" placeholder="Note…" value="${esc(S.elNote)}" oninput="S.elNote=this.value" style="margin-bottom:6px" onkeydown="if(event.key==='Enter')saveLinkEdit()"/>
      <select class="input" style="margin-bottom:10px" onchange="S.elCat=this.value">${CATS.map(c=>`<option value="${c.id}" ${S.elCat===c.id?'selected':''}>${c.label}</option>`).join('')}</select>
      <div class="row"><button class="btn" style="background:${p.accent}" onclick="saveLinkEdit()">${ic('save',12,'white')} Save</button><button class="btn-ghost" onclick="S.editingLink=null;render()">Cancel</button></div>
    </div>`:''}
    ${groups.map(g=>`
      <div class="cat-group-hdr" style="color:${g.cat.color}">
        <span class="cat-pill" style="background:${g.cat.color}18;color:${g.cat.color};border:1px solid ${g.cat.color}40;cursor:default">${g.cat.label}</span>
        <span style="color:#3a3a50;font-size:16px">${g.items.length}</span>
      </div>
      ${g.items.map(l=>{const cat=CATS.find(c=>c.id===l.cat)||CATS[CATS.length-1];return `<div class="link-card" style="border-left-color:${cat.color}" onclick="openLink('${l.id}')">
        <div class="link-favicon"><img src="https://www.google.com/s2/favicons?domain=${esc(domain(l.url))}&sz=32" style="width:16px;height:16px" onerror="this.style.display='none'" alt=""/></div>
        <div style="flex:1;min-width:0">
          <div class="link-domain">${esc(domain(l.url))}</div>
          <div class="link-title">${esc(l.label||l.url)}</div>
          ${l.note?`<div class="link-note">${esc(l.note)}</div>`:''}
          <div style="font-size:16px;color:#3a3a50;font-family:'DM Mono',monospace;margin-top:3px">${new Date(l.saved).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          <button class="btn-icon" onclick="event.stopPropagation();editLink('${l.id}')" style="color:#3a3a50">${ic('edit',12)}</button>
          <button class="btn-icon" onclick="event.stopPropagation();deleteLink('${l.id}')">${ic('trash',12)}</button>
        </div>
      </div>`;}).join('')}
    `).join('')}
    <div style="margin-top:24px;padding:14px;background:#13131a;border-radius:10px;border:1px solid #1c1c28">
      <div class="section-label" style="margin-bottom:6px">iPhone tip</div>
      <p style="font-size:16px;color:#6b6b8a;line-height:1.7">In Safari: tap <strong style="color:#9090b0">Share</strong> → <strong style="color:#9090b0">Copy</strong>, then open DAN and paste here.<br><br>
      For a one-tap shortcut, open the <strong style="color:#9090b0">Shortcuts</strong> app, create a new shortcut: <em>Get clipboard</em> → <em>Open URL</em> pointing to this app. Run it after copying a link.</p>
    </div>`;

  // Event modal
  const evDay2=d=>cevts().filter(e=>e.day===d&&e.month===S.calMonth&&e.year===S.calYear);
  const modalHtml=S.showEvtModal&&S.selDay?`<div class="modal-overlay" onclick="closeEvtModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr"><h3 style="font-size:16px;font-weight:600">${MONTHS[S.calMonth]} ${S.selDay}, ${S.calYear}</h3><button onclick="closeEvtModal()" style="background:none;border:none;color:#6b6b8a;cursor:pointer">${ic('x',15,'#6b6b8a')}</button></div>
    ${evDay2(S.selDay).map(ev=>`<div class="ev-card"><div class="ev-card-top"><span style="font-size:16px;font-weight:500;flex:1">${esc(ev.text)}</span><button class="btn-icon" onclick="deleteCEvt('${ev.id}')">${ic('x',12)}</button></div>${ev.address?`<a href="https://maps.google.com/?q=${encodeURIComponent(ev.address)}" target="_blank" class="ev-meta">${ic('mapPin',10)} ${esc(ev.address)}</a>`:''}${ev.url?`<a href="${ev.url.startsWith('http')?ev.url:'https://'+ev.url}" target="_blank" class="ev-meta">${ic('extLink',10)} ${esc(ev.url.length>40?ev.url.slice(0,40)+'…':ev.url)}</a>`:''}</div>`).join('')}
    <div style="display:flex;flex-direction:column;gap:6px">
      <div class="row">
        <input class="input flex1" id="evtTextInput" placeholder="Event name…" value="${esc(S.evtText)}" oninput="S.evtText=this.value" onkeydown="if(event.key==='Enter')submitEvt()"/>
        <button style="background:${S.evtExtra?'#2a2a38':'#1a1a22'};border:1px solid #2a2a38;color:${S.evtExtra?p.accent:'#6b6b8a'};border-radius:8px;padding:0 10px;height:39px;font-size:16px;white-space:nowrap;cursor:pointer;flex-shrink:0" onclick="S.evtExtra=!S.evtExtra;render()">+ Details</button>
      </div>
      ${S.evtExtra?`<div class="row">${ic('mapPin',12,'#6b6b8a')}<input class="input flex1" placeholder="Address…" value="${esc(S.evtAddr)}" oninput="S.evtAddr=this.value"/></div><div class="row">${ic('link',12,'#6b6b8a')}<input class="input flex1" placeholder="URL (Zoom, website…)" value="${esc(S.evtUrl)}" oninput="S.evtUrl=this.value"/></div>`:''}
      <button class="btn" style="background:${p.accent};width:100%;margin-top:2px" onclick="submitEvt()">Add Event</button>
    </div>
  </div></div>`:'';

  document.getElementById('app').innerHTML=`<div class="app" style="background:${p.bg}">
    <div class="header">
      <div class="header-top">
        <div style="position:relative">
          <button class="profile-btn" style="border-color:${p.bdr}" onclick="toggleMenu()">
            ${ic(p.icon,13,p.accent)}<span style="color:${p.accent}">${p.label}</span>
            <span style="display:inline-flex;transform:${S.showMenu?'rotate(180deg)':'none'};transition:transform 0.2s">${ic('chevronDown',11,'#6b6b8a')}</span>
          </button>
          ${pmHtml}
        </div>
        <span class="date-label">${today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span>
      </div>
      ${tabsHtml}
    </div>
    <div class="backdrop ${S.showMenu?'open':''}" onclick="S.showMenu=false;render()"></div>
    <div class="content">
      <div class="tab-content ${S.tab==='todos'?'active':''}">${todosHtml}</div>
      <div class="tab-content ${S.tab==='notes'?'active':''}">${notesHtml}</div>
      <div class="tab-content ${S.tab==='calendar'?'active':''}">${calHtml}</div>
      <div class="tab-content ${S.tab==='links'?'active':''}">${linksHtml}</div>
    </div>
    ${modalHtml}
  </div>`;

  // Restore textarea values after innerHTML replace
  if(S.editNote){const tb=document.getElementById('editBodyInput');if(tb)tb.value=S.editBody;}
  const li=document.getElementById('linkInput'); if(li)li.value=S.linkInput;
  if(S.showNewFolder)setTimeout(()=>{const el=document.getElementById('nfi');if(el)el.focus();},10);
  if(S.showEvtModal)setTimeout(()=>{const el=document.getElementById('evtTextInput');if(el)el.focus();},10);
}

function evtRow(ev,p){return `<div class="ev-list-item"><div class="ev-list-top"><span class="ev-date" style="color:${p.accent}">${MONTHS[ev.month].slice(0,3)} ${ev.day}, ${ev.year}</span><span style="font-size:16px;flex:1;word-break:break-word">${esc(ev.text)}</span><button class="btn-icon" onclick="deleteCEvt('${ev.id}')">${ic('x',12)}</button></div>${ev.address?`<a href="https://maps.google.com/?q=${encodeURIComponent(ev.address)}" target="_blank" class="ev-list-meta">${ic('mapPin',10)} ${esc(ev.address)}</a>`:''}${ev.url?`<a href="${ev.url.startsWith('http')?ev.url:'https://'+ev.url}" target="_blank" class="ev-list-meta">${ic('extLink',10)} ${esc(ev.url.length>45?ev.url.slice(0,45)+'…':ev.url)}</a>`:''}</div>`;}

// Actions
function switchProfile(id){S.profileId=id;sv('db_activeProfile',id);S.tab='todos';S.showMenu=false;S.editNote=null;S.newTodo='';S.selFolder=null;S.linkFilter=null;render();}
function toggleMenu(){S.showMenu=!S.showMenu;render();}
function setTab(t){S.tab=t;S.editNote=null;render();}

function addTodo(){const text=S.newTodo.trim();if(!text)return;const tds=todos();tds.unshift({id:Date.now().toString(),text,done:false,priority:S.todoPri,created:new Date().toISOString()});sTodos(tds);S.newTodo='';render();setTimeout(()=>{const el=document.getElementById('newTodoInput');if(el)el.focus();},10);}
function toggleTodo(id){const tds=todos();const t=tds.find(x=>x.id===id);if(t)t.done=!t.done;sTodos(tds);render();}
function deleteTodo(id){sTodos(todos().filter(t=>t.id!==id));render();}

function newNote(){const n={id:Date.now().toString(),title:'Untitled',body:'',folder:S.selFolder||'',links:[],files:[],updated:new Date().toISOString()};const nts=notes();nts.unshift(n);sNotes(nts);S.editNote=n;S.editTitle=n.title;S.editBody='';S.editFolder=n.folder;S.editLinks=[];S.editFiles=[];S.showAttach=false;render();}
function openNote(id){const n=notes().find(x=>x.id===id);if(!n)return;S.editNote=n;S.editTitle=n.title;S.editBody=n.body;S.editFolder=n.folder||'';S.editLinks=n.links||[];S.editFiles=n.files||[];S.showAttach=false;render();}
function saveNote(){const nts=notes();const i=nts.findIndex(x=>x.id===S.editNote.id);if(i>-1)nts[i]={...nts[i],title:S.editTitle||'Untitled',body:S.editBody,folder:S.editFolder,links:S.editLinks,files:S.editFiles,updated:new Date().toISOString()};sNotes(nts);S.editNote=null;S.showAttach=false;render();}
function cancelEdit(){S.editNote=null;S.showAttach=false;render();}
function deleteNote(id){sNotes(notes().filter(n=>n.id!==id));if(S.editNote?.id===id)S.editNote=null;render();}
function addFolder(){const name=S.newFolderName.trim();if(!name)return;const fls=folds();if(fls.includes(name))return;fls.push(name);sFolds(fls);S.newFolderName='';S.showNewFolder=false;render();}
function deleteFolder(name){sFolds(folds().filter(f=>f!==name));sNotes(notes().map(n=>n.folder===name?{...n,folder:''}:n));if(S.selFolder===name)S.selFolder=null;render();}
function addNoteLink(){if(!S.noteLink.trim())return;S.editLinks.push({id:Date.now().toString(),label:S.noteLinkLabel.trim()||S.noteLink.trim(),url:S.noteLink.trim()});S.noteLink='';S.noteLinkLabel='';render();}
function removeNoteLink(id){S.editLinks=S.editLinks.filter(l=>l.id!==id);render();}
function removeNoteFile(id){S.editFiles=S.editFiles.filter(f=>f.id!==id);render();}
function handleFileAttach(e){Array.from(e.target.files).forEach(file=>{const r=new FileReader();r.onload=ev=>{S.editFiles.push({id:(Date.now()+Math.random()).toString(),name:file.name,size:file.size,type:file.type,data:ev.target.result});render();};r.readAsDataURL(file);});e.target.value='';}

function prevMo(){if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;render();}
function nextMo(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;render();}
function openEvtModal(day){S.selDay=day;S.showEvtModal=true;S.evtText='';S.evtAddr='';S.evtUrl='';S.evtExtra=false;render();}
function closeEvtModal(){S.showEvtModal=false;S.selDay=null;render();}
function submitEvt(){if(!S.evtText.trim())return;const evts=cevts();evts.push({id:Date.now().toString(),day:S.selDay,month:S.calMonth,year:S.calYear,text:S.evtText.trim(),address:S.evtAddr.trim(),url:S.evtUrl.trim()});sCevts(evts);S.evtText='';S.evtAddr='';S.evtUrl='';S.evtExtra=false;render();}
function deleteCEvt(id){sCevts(cevts().filter(e=>e.id!==id));render();}

function extractUrls(text){const rx=/https?:\/\/[^\s,\n\r]+|www\.[^\s,\n\r]+\.[^\s,\n\r]{2,}/gi;return[...new Set(text.match(rx)||[])];}
function addLinks(){const raw=S.linkInput.trim();if(!raw)return;let urls=extractUrls(raw);if(!urls.length){const u=raw.startsWith('http')?raw:'https://'+raw;urls=[u];}const lks=links();const noteText=S.linkNote.trim();urls.forEach(url=>{const cat=catFor(url);lks.unshift({id:Date.now().toString()+(Math.random()*1000|0),url:url.trim(),label:'',note:noteText,cat:cat.id,saved:new Date().toISOString()});});sLinks(lks);S.linkInput='';S.linkNote='';render();}
function openLink(id){const l=links().find(x=>x.id===id);if(!l)return;const url=l.url.startsWith('http')?l.url:'https://'+l.url;window.open(url,'_blank');}
function deleteLink(id){sLinks(links().filter(l=>l.id!==id));render();}
function editLink(id){const l=links().find(x=>x.id===id);if(!l)return;S.editingLink=id;S.elLabel=l.label||'';S.elNote=l.note||'';S.elCat=l.cat;render();}
function saveLinkEdit(){const lks=links();const i=lks.findIndex(l=>l.id===S.editingLink);if(i>-1)lks[i]={...lks[i],label:S.elLabel,note:S.elNote,cat:S.elCat};sLinks(lks);S.editingLink=null;render();}

render();
</script>
</body>
</html>
