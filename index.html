<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#090f0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DAN v1"/>
  <title>DAN v1</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Sora',sans-serif;font-size:14px;background:#090f0b;color:#e8e6f0;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overflow-x:hidden;}
    input,textarea,select{font-family:'Sora',sans-serif;font-size:16px;}
    button{font-family:'Sora',sans-serif;font-size:14px;cursor:pointer;}
    a{text-decoration:none;}
    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px;}
    .app{min-height:100vh;transition:background 0.3s;}
    .header{padding:max(env(safe-area-inset-top,44px),48px) 14px 0;}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .content{padding:14px 14px 90px;}
    .profile-btn{display:flex;align-items:center;gap:6px;background:#13131a;border-radius:9px;padding:6px 11px;border:1px solid #2a2a38;}
    .profile-btn .plabel{font-size:13px;font-weight:600;}
    .profile-menu{position:absolute;top:calc(100% + 6px);left:0;background:#14141c;border:1px solid #2a2a38;border-radius:12px;overflow:hidden;z-index:50;min-width:185px;box-shadow:0 12px 40px rgba(0,0,0,0.65);display:none;}
    .profile-menu.open{display:block;}
    .profile-option{display:flex;align-items:center;gap:8px;width:100%;padding:11px 13px;background:transparent;border:none;color:#9090b0;font-size:13px;font-weight:400;border-left:3px solid transparent;text-align:left;}
    .profile-option.active{background:#1c1c28;font-weight:600;}
    .profile-option .ab{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;opacity:0.7;}
    .menu-divider{height:1px;background:#1c1c28;margin:4px 0;}
    .menu-action{display:flex;align-items:center;gap:8px;width:100%;padding:10px 13px;background:transparent;border:none;color:#6b6b8a;font-size:12px;text-align:left;cursor:pointer;}
    .menu-action:hover{background:#1a1a24;color:#9090b0;}
    .backdrop{position:fixed;inset:0;z-index:40;display:none;}
    .backdrop.open{display:block;}
    .tabs{display:flex;border-bottom:1px solid #1c1c28;overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab-btn{display:flex;align-items:center;gap:4px;flex-shrink:0;padding:8px 12px;font-size:12px;font-weight:500;color:#6b6b8a;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
    .tab-btn.active{border-bottom-color:currentColor;}
    .tab-content{display:none;}.tab-content.active{display:block;}
    .input{background:#1a1a22;border:1px solid #2a2a38;color:#e8e6f0;border-radius:8px;padding:8px 11px;font-size:16px;outline:none;transition:border-color 0.2s;width:100%;}
    .input:focus{border-color:var(--accent,#22c55e);}
    .input::placeholder{color:#3a3a50;}
    textarea.input{resize:vertical;}
    .btn{border:none;color:white;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;transition:filter 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
    .btn:active{filter:brightness(0.85);}
    .btn-ghost{background:none;border:1px solid #2a2a38;color:#6b6b8a;padding:6px 11px;border-radius:8px;font-size:13px;}
    .btn-icon{background:none;border:none;color:#2e2e40;padding:4px;transition:color 0.15s;display:inline-flex;align-items:center;}
    .btn-icon:active{color:#ef4444;}
    .todo-row{display:flex;align-items:center;gap:9px;padding:10px 11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;margin-bottom:6px;animation:slideIn 0.15s ease;}
    .todo-row.done{opacity:0.4;}
    .todo-check{width:20px;height:20px;border-radius:5px;border:2px solid #3a3a50;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .todo-check.checked{border:none;}
    .todo-text{flex:1;font-size:14px;word-break:break-word;}
    .todo-text.done{text-decoration:line-through;color:#3a3a50;}
    .pri-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;flex-shrink:0;}
    @keyframes slideIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
    .notes-layout{display:flex;gap:10px;}
    .folder-sidebar{width:120px;flex-shrink:0;}
    .note-card{display:flex;align-items:center;padding:10px 11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;border-left:3px solid;cursor:pointer;margin-bottom:6px;}
    .note-title{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
    .note-preview{font-size:11px;color:#3a3a50;font-family:'DM Mono',monospace;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .folder-row{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:2px;border:1px solid transparent;position:relative;}
    .folder-count{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;opacity:0.6;}
    .folder-del{position:absolute;right:3px;background:none;border:none;color:transparent;padding:2px;cursor:pointer;}
    .folder-row:hover .folder-del{color:#ef4444;}
    .editor-title{width:100%;background:transparent;border:none;border-bottom:1px solid #2a2a38;color:#e8e6f0;font-size:18px;font-weight:600;padding:0 0 8px;outline:none;font-family:inherit;margin-bottom:10px;}
    .editor-body{width:100%;background:transparent;border:none;color:#e8e6f0;font-size:16px;line-height:1.7;outline:none;font-family:inherit;resize:vertical;padding:0;min-height:140px;}
    .attach-panel{margin-top:12px;padding:11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;}
    .attach-label{font-size:10px;color:#6b6b8a;margin-bottom:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
    .attach-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;overflow:hidden;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .cal-day-hdr{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:#3a3a50;padding:3px 0;}
    .cal-cell{min-height:46px;padding:4px 3px;border-radius:6px;background:#13131a;border:1px solid #1a1a22;cursor:pointer;}
    .cal-cell:active{background:#1e1e2a;}
    .cal-cell.empty{background:transparent;border:none;cursor:default;}
    .cal-num{font-size:11px;text-align:right;margin-bottom:2px;color:#909090;}
    .cal-num.today{font-weight:700;}
    .cal-ev-pill{font-size:9px;border-radius:3px;padding:1px 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
    .modal{background:#17171f;border:1px solid #2a2a38;border-radius:18px 18px 0 0;padding:18px 16px 40px;width:100%;max-height:90vh;overflow-y:auto;}
    .modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
    .ev-card{background:#0f0f13;border-radius:8px;padding:9px 10px;margin-bottom:6px;}
    .ev-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;}
    .ev-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b6b8a;margin-top:4px;}
    .ev-list-item{padding:9px 11px;background:#13131a;border-radius:8px;border:1px solid #1c1c28;margin-bottom:6px;}
    .ev-list-top{display:flex;align-items:flex-start;gap:7px;}
    .ev-date{font-family:'DM Mono',monospace;font-size:11px;min-width:75px;flex-shrink:0;padding-top:1px;}
    .ev-list-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b6b8a;margin-top:4px;margin-left:82px;}
    .linked-item{display:flex;align-items:center;gap:6px;padding:4px 7px;background:#1a1a24;border-radius:5px;margin-top:3px;font-size:11px;color:#9090b0;cursor:pointer;}
    .linked-item:hover{color:var(--accent);}
    .link-card{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;border-left:3px solid;animation:slideIn 0.15s ease;margin-bottom:6px;cursor:pointer;}
    .link-card:active{background:#1a1a24;}
    .link-favicon{width:18px;height:18px;border-radius:4px;flex-shrink:0;background:#2a2a38;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:1px;}
    .link-domain{font-family:'DM Mono',monospace;font-size:10px;color:#5a5a78;margin-bottom:2px;}
    .link-title{font-size:13px;font-weight:500;line-height:1.3;word-break:break-word;}
    .link-note{font-size:11px;color:#6b6b8a;margin-top:3px;}
    .cat-group-hdr{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin:16px 0 7px;display:flex;align-items:center;gap:5px;}
    .cat-pill{font-size:10px;padding:3px 7px;border-radius:5px;font-family:'DM Mono',monospace;cursor:pointer;}
    .link-paste-area{width:100%;min-height:40px;background:#1a1a22;border:1px dashed #2a2a38;border-radius:8px;padding:9px 11px;font-size:16px;color:#e8e6f0;outline:none;font-family:'Sora',sans-serif;resize:none;transition:border-color 0.2s;}
    .link-paste-area:focus{border-color:var(--accent,#22c55e);border-style:solid;}
    .link-paste-area::placeholder{color:#3a3a50;}
    .picker-row{display:flex;align-items:center;gap:7px;padding:7px 9px;background:#13131a;border-radius:7px;border:1px solid #1c1c28;margin-bottom:4px;cursor:pointer;}
    .picker-row.selected{border-color:var(--accent);background:var(--accent-dim,rgba(34,197,94,0.08));}
    .picker-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;}
    .import-zone{border:2px dashed #2a2a38;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;}
    .import-zone:hover,.import-zone.drag{border-color:var(--accent);}
    .chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;}
    .date-label{font-size:11px;color:#5a5a78;font-family:'DM Mono',monospace;}
    .section-label{font-size:10px;font-family:'DM Mono',monospace;color:#5a5a78;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
    .row{display:flex;gap:6px;align-items:center;}
    .flex1{flex:1;min-width:0;}
    .empty-state{text-align:center;padding:44px 0 26px;color:#2e2e40;}
    .empty-state p{font-size:13px;margin-top:9px;line-height:1.6;}
  </style>
</head>
<body>
<div id="app"></div>
<script>

const ICO={
  user:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  rocket:'<path d="M4.5 16.5c-1.5 1-1.5 2.5 0 5 .5.5 2.5 1.5 4 0 0-1.5-2-3-4-5z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>',
  star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  briefcase:'<rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
  layers:'<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
  chevronDown:'<polyline points="6 9 12 15 18 9"/>',
  chevronLeft:'<polyline points="15 18 9 12 15 6"/>',
  chevronRight:'<polyline points="9 18 15 12 9 6"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  plus:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  check:'<polyline points="20 6 9 12 4 8"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>',
  save:'<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
  fileText:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
  checkSquare:'<polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
  calendar:'<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  link2:'<path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/><line x1="8" y1="12" x2="16" y2="12"/>',
  link:'<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
  folder:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
  folderOpen:'<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="2 10 22 10"/>',
  alignLeft:'<line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/>',
  paperclip:'<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
  mapPin:'<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>',
  extLink:'<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',
  edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  package:'<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
};
function ic(n,s,c){s=s||16;c=c||'currentColor';return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(ICO[n]||'')+'</svg>';}

const PROFILES=[
  {id:'personal',    label:'Personal',    icon:'user',      accent:'#22c55e',dim:'rgba(34,197,94,0.08)',  bdr:'rgba(34,197,94,0.25)',  bg:'#090f0b',isDocket:false},
  {id:'ventures',    label:'Ventures',    icon:'rocket',    accent:'#eab308',dim:'rgba(234,179,8,0.08)', bdr:'rgba(234,179,8,0.25)', bg:'#0f0e06',isDocket:false},
  {id:'professional',label:'Professional',icon:'star',      accent:'#3b82f6',dim:'rgba(59,130,246,0.08)',bdr:'rgba(59,130,246,0.25)',bg:'#07090f',isDocket:false},
  {id:'work',        label:'Work',        icon:'briefcase', accent:'#ef4444',dim:'rgba(239,68,68,0.08)', bdr:'rgba(239,68,68,0.25)', bg:'#0f0707',isDocket:false},
  {id:'docket',      label:"Dan's Docket",icon:'layers',    accent:'#6060c0',dim:'rgba(96,96,192,0.1)',  bdr:'rgba(96,96,192,0.3)',  bg:'#f0f0f5',isDocket:true},
];
const CORE=PROFILES.filter(function(p){return !p.isDocket;});
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CATS=[
  {id:'youtube',label:'YouTube',  color:'#ef4444',match:function(u){return u.includes('youtube.com')||u.includes('youtu.be');}},
  {id:'article',label:'Article',  color:'#f59e0b',match:function(u){return /medium\.com|substack|blog|news|article/.test(u);}},
  {id:'docs',   label:'Docs',     color:'#3b82f6',match:function(u){return /docs\.|notion\.so|confluence|readme|gitbook/.test(u);}},
  {id:'github', label:'GitHub',   color:'#a78bfa',match:function(u){return u.includes('github.com')||u.includes('gitlab.com');}},
  {id:'tool',   label:'Tool',     color:'#22c55e',match:function(u){return /app\.|dashboard|figma|linear\.app|airtable|vercel|netlify|supabase/.test(u);}},
  {id:'social', label:'Social',   color:'#ec4899',match:function(u){return /twitter\.com|x\.com|instagram|linkedin|threads|reddit|tiktok/.test(u);}},
  {id:'shop',   label:'Shopping', color:'#f97316',match:function(u){return /amazon\.com|ebay|shopify|shop|store/.test(u);}},
  {id:'ref',    label:'Reference',color:'#6ee7b7',match:function(u){return /wikipedia|stackoverflow|mdn|developer\.mozilla/.test(u);}},
  {id:'other',  label:'Other',    color:'#9090b0',match:function(){return true;}},
];
function catFor(url){try{url=url.toLowerCase();}catch(e){}return CATS.find(function(c){return c.match(url);})||CATS[CATS.length-1];}
function domain(url){try{var u=url.startsWith('http')?url:'https://'+url;return new URL(u).hostname.replace(/^www\./,'');}catch(e){return url;}}
function ld(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}
function pk(pid,k){return 'db_'+pid+'_'+k;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function fmtSz(b){return b<1024?b+'B':b<1048576?(b/1024).toFixed(1)+'KB':(b/1048576).toFixed(1)+'MB';}

var S={
  profileId:ld('db_activeProfile','personal'),tab:'todos',showMenu:false,
  newTodo:'',todoPri:'medium',
  editNote:null,selFolder:null,showNewFolder:false,newFolderName:'',
  showAttach:false,editTitle:'',editBody:'',editFolder:'',editLinks:[],editFiles:[],
  noteLink:'',noteLinkLabel:'',
  calMonth:new Date().getMonth(),calYear:new Date().getFullYear(),
  selDay:null,showEvtModal:false,evtText:'',evtAddr:'',evtUrl:'',evtExtra:false,
  evtLinkedTodos:[],evtLinkedNotes:[],evtLinkedLinks:[],showLinkPicker:false,
  linkInput:'',linkNote:'',linkFilter:null,
  editingLink:null,elLabel:'',elNote:'',elCat:'',
  showImportModal:false,importTarget:'todos',importPreview:[],importFile:null,importDocketProfile:'personal',
  docketTab:'todos',docketFilter:'all',
};

function pid(){return S.profileId;}
function P(){return PROFILES.find(function(p){return p.id===pid();});}
function isDock(){return P().isDocket;}
function profileData(profId){
  return {
    todos:ld(pk(profId,'todos'),[]),notes:ld(pk(profId,'notes'),[]),
    calevents:ld(pk(profId,'calevents'),[]),folders:ld(pk(profId,'folders'),[]),links:ld(pk(profId,'links'),[])
  };

function render(){

  document.body.style.background=isDock()?'#f0f0f5':p.bg;
  document.body.style.color=isDock()?'#1a1a2e':'#e8e6f0';
  document.documentElement.style.setProperty('--accent',isDock()?'#6060c0':p.accent);
  document.documentElement.style.setProperty('--accent-dim',isDock()?'rgba(96,96,192,0.1)':p.dim);
  document.getElementById('app').innerHTML=isDock()?renderDocket(p,today):renderMain(p,today);
  if(S.editNote){var tb=document.getElementById('editBodyInput');if(tb)tb.value=S.editBody;}
  var li=document.getElementById('linkInput');if(li)li.value=S.linkInput;
  if(S.showNewFolder)setTimeout(function(){var el=document.getElementById('nfi');if(el)el.focus();},10);
  if(S.showEvtModal)setTimeout(function(){var el=document.getElementById('evtTextInput');if(el)el.focus();},10);

        (curLks.length?'<div style="font-size:11px;color:#5a5a78;margin:'+(curTds.length||curNts.length?'8px':'0')+'0 5px">Links</div>'+curLks.map(function(l){var sel=S.evtLinkedLinks.indexOf(l.id)>-1;return '<div class="picker-row '+(sel?'selected':'')+'" onclick="toggleEvtLink(\'link\',\''+l.id+'\')"><input type="checkbox" '+(sel?'checked':'')+' onclick="event.stopPropagation()"/><span style="font-size:13px">'+esc(l.label||domain(l.url))+'</span></div>';}).join(''):'')+
      '</div>':'';

    modalHtml='<div class="modal-overlay" onclick="closeEvtModal()"><div class="modal" onclick="event.stopPropagation()">'+
      '<div class="modal-hdr"><h3 style="font-size:14px;font-weight:600">'+MONTHS[S.calMonth]+' '+S.selDay+', '+S.calYear+'</h3>'+
        '<button onclick="closeEvtModal()" style="background:none;border:none;color:#6b6b8a;cursor:pointer">'+ic('x',15,'#6b6b8a')+'</button></div>'+
      dayEvts.map(function(ev){return '<div class="ev-card">'+
        '<div class="ev-card-top"><span style="font-size:13px;font-weight:500;flex:1">'+esc(ev.text)+'</span>'+

        (ev.address?'<a href="https://maps.google.com/?q='+encodeURIComponent(ev.address)+'" target="_blank" class="ev-meta">'+ic('mapPin',10)+' '+esc(ev.address)+'</a>':'')+
        (ev.url?'<a href="'+(ev.url.startsWith('http')?ev.url:'https://'+ev.url)+'" target="_blank" class="ev-meta">'+ic('extLink',10)+' '+esc(ev.url.length>40?ev.url.slice(0,40)+'\u2026':ev.url)+'</a>':'')+
        (ev.linkedTodos&&ev.linkedTodos.length?ev.linkedTodos.map(function(id){var t=curTds.find(function(x){return x.id===id;});return t?'<div class="linked-item">'+ic('checkSquare',10,'currentColor')+' '+esc(t.text)+'</div>':'';}).join(''):'')+
        (ev.linkedNotes&&ev.linkedNotes.length?ev.linkedNotes.map(function(id){var n=curNts.find(function(x){return x.id===id;});return n?'<div class="linked-item" onclick="openNote(\''+n.id+'\');closeEvtModal()">'+ic('fileText',10,'currentColor')+' '+esc(n.title||'Untitled')+'</div>':'';}).join(''):'')+
        (ev.linkedLinks&&ev.linkedLinks.length?ev.linkedLinks.map(function(id){var l=curLks.find(function(x){return x.id===id;});return l?'<div class="linked-item" onclick="openLink(\''+l.id+'\')">'+ic('link2',10,'currentColor')+' '+esc(l.label||domain(l.url))+'</div>':'';}).join(''):'')+
      '</div>';}).join('')+
      '<div style="display:flex;flex-direction:column;gap:6px">'+
        '<div class="row">'+
          '<input class="input flex1" id="evtTextInput" placeholder="Event name\u2026" value="'+esc(S.evtText)+'" oninput="S.evtText=this.value" onkeydown="if(event.key===\'Enter\')submitEvt()"/>'+
          '<button style="background:'+(S.evtExtra?'#2a2a38':'#1a1a22')+';border:1px solid #2a2a38;color:'+(S.evtExtra?p.accent:'#6b6b8a')+';border-radius:8px;padding:0 10px;height:39px;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0" onclick="S.evtExtra=!S.evtExtra;render()">+ Details</button>'+
        '</div>'+
        (S.evtExtra?'<div class="row">'+ic('mapPin',12,'#6b6b8a')+'<input class="input flex1" placeholder="Address\u2026" value="'+esc(S.evtAddr)+'" oninput="S.evtAddr=this.value"/></div><div class="row">'+ic('link',12,'#6b6b8a')+'<input class="input flex1" placeholder="URL (Zoom, website\u2026)" value="'+esc(S.evtUrl)+'" oninput="S.evtUrl=this.value"/></div>':'')+
        '<button style="background:'+(S.showLinkPicker?p.dim:'#1a1a22')+';border:1px solid '+(S.showLinkPicker?p.bdr:'#2a2a38')+';color:'+(S.showLinkPicker?p.accent:'#6b6b8a')+';border-radius:8px;padding:7px 12px;font-size:12px;text-align:left;cursor:pointer;display:flex;align-items:center;gap:6px" onclick="S.showLinkPicker=!S.showLinkPicker;render()">'+
          ic('package',12,'currentColor')+' Attach to-dos / notes / links'+
          (linkedCount>0?'<span style="margin-left:auto;background:'+p.accent+';color:white;border-radius:10px;padding:1px 6px;font-size:10px">'+linkedCount+'</span>':'')+
        '</button>'+
        pickerHtml+
        '<button class="btn" style="background:'+p.accent+';width:100%;margin-top:2px" onclick="submitEvt()">Add Event</button>'+
      '</div>'+
    '</div></div>';

    '<div class="header">'+
      '<div class="header-top">'+
        '<div style="position:relative">'+

            '<span style="display:inline-flex;transform:'+(S.showMenu?'rotate(180deg)':'none')+';transition:transform 0.2s">'+ic('chevronDown',11,'#6b6b8a')+'</span>'+
          '</button>'+pmHtml+

      '<div class="tab-content '+(S.tab==='calendar'?'active':'')+'">'+calHtml+'</div>'+
      '<div class="tab-content '+(S.tab==='links'?'active':'')+'">'+linksHtml+'</div>'+
    '</div>'+
    modalHtml+importHtml+
  '</div>';
}

function renderDocket(p,today){
  var accent='#6060c0';
  var allTodos=[],allNotes=[],allEvents=[],allLinks=[];
  CORE.forEach(function(pr){
    var d=profileData(pr.id);
    d.todos.forEach(function(t){allTodos.push(Object.assign({},t,{_profile:pr}));});
    d.notes.forEach(function(n){allNotes.push(Object.assign({},n,{_profile:pr}));});
    d.calevents.forEach(function(e){allEvents.push(Object.assign({},e,{_profile:pr}));});
    d.links.forEach(function(l){allLinks.push(Object.assign({},l,{_profile:pr}));});
  });
  var PC={high:'#ef4444',medium:'#f59e0b',low:'#6ee7b7'},PL={high:'High',medium:'Med',low:'Low'};
  var todayMs=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();
  var pmHtml=profileMenu(p,true);
  var TABS=[{id:'todos',l:'To-Do',i:'checkSquare'},{id:'notes',l:'Notes',i:'fileText'},{id:'calendar',l:'Calendar',i:'calendar'},{id:'links',l:'Links',i:'link2'}];
  var tabsHtml='<div class="tabs" style="border-bottom-color:#d0d0e8">'+TABS.map(function(t){return '<button class="tab-btn '+(S.docketTab===t.id?'active':'')+'" style="color:'+(S.docketTab===t.id?accent:'#8080a0')+'" onclick="S.docketTab=\''+t.id+'\';render()">'+ic(t.i,13,S.docketTab===t.id?accent:'#8080a0')+' '+t.l+'</button>';}).join('')+'</div>';
  var filterPills='<div class="row" style="flex-wrap:wrap;gap:5px;margin-bottom:14px">'+
    '<button class="cat-pill" onclick="S.docketFilter=\'all\';render()" style="background:'+(S.docketFilter==='all'?'rgba(96,96,192,0.12)':'#e8e8f4')+';color:'+(S.docketFilter==='all'?accent:'#8080a0')+';border:1px solid '+(S.docketFilter==='all'?'rgba(96,96,192,0.3)':'#d0d0e8')+'">All</button>'+
    CORE.map(function(pr){return '<button class="cat-pill" onclick="S.docketFilter=\''+pr.id+'\';render()" style="background:'+(S.docketFilter===pr.id?pr.accent+'22':'#e8e8f4')+';color:'+(S.docketFilter===pr.id?pr.accent:'#8080a0')+';border:1px solid '+(S.docketFilter===pr.id?pr.accent+'55':'#d0d0e8')+'">'+pr.label+'</button>';}).join('')+
  '</div>';
  function filt(item){return S.docketFilter==='all'||item._profile.id===S.docketFilter;}
  var tabContent='';
  if(S.docketTab==='todos'){
    var filtered=allTodos.filter(filt);
    tabContent=filterPills+
      (!filtered.length?'<div class="empty-state" style="color:#b0b0c8"><p>No tasks.</p></div>':'')+
      filtered.map(function(t){return '<div class="todo-row '+(t.done?'done':'')+'" style="background:#fff;border-color:#e8e8f4">'+
        '<button class="todo-check '+(t.done?'checked':'')+'" style="'+(t.done?'background:'+t._profile.accent+';':'')+'border-color:#c0c0d8" onclick="docketToggleTodo(\''+t._profile.id+'\',\''+t.id+'\')">'+
        (t.done?ic('check',11,'white'):'')+
        '</button>'+
        '<span class="todo-text '+(t.done?'done':'')+'" style="color:#1a1a2e">'+esc(t.text)+'</span>'+
        '<span class="pri-badge" style="background:'+PC[t.priority]+'18;color:'+PC[t.priority]+'">'+PL[t.priority]+'</span>'+
        '<span class="chip" style="background:'+t._profile.accent+'18;color:'+t._profile.accent+'">'+ic(t._profile.icon,9,t._profile.accent)+' '+t._profile.label+'</span>'+
        '<button class="btn-icon" style="color:#c0c0d8" onclick="docketDeleteTodo(\''+t._profile.id+'\',\''+t.id+'\')">'+ic('trash',12)+'</button>'+
      '</div>';}).join('');
  } else if(S.docketTab==='notes'){
    var filtered=allNotes.filter(filt);
    tabContent=filterPills+
      (!filtered.length?'<div class="empty-state" style="color:#b0b0c8"><p>No notes.</p></div>':'')+
      filtered.map(function(n){return '<div class="note-card" style="background:#fff;border-color:#e8e8f4;border-left-color:'+n._profile.accent+'" onclick="docketOpenNote(\''+n._profile.id+'\',\''+n.id+'\')">'+
        '<div style="overflow:hidden;flex:1">'+
          '<div class="note-title" style="color:#1a1a2e">'+esc(n.title||'Untitled')+'</div>'+
          '<div class="note-preview" style="color:#8080a0">'+
            '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px">'+(n.body?esc(n.body.slice(0,35))+'\u2026':'Empty')+'</span>'+
            '<span class="chip" style="background:'+n._profile.accent+'18;color:'+n._profile.accent+'">'+n._profile.label+'</span>'+
          '</div>'+
        '</div>'+
      '</div>';}).join('');
  } else if(S.docketTab==='calendar'){
    var filtered=allEvents.filter(filt).sort(function(a,b){return new Date(a.year,a.month,a.day)-new Date(b.year,b.month,b.day);});
    var upcomingD=filtered.filter(function(e){return new Date(e.year,e.month,e.day).getTime()>=todayMs;});
    var pastD=filtered.filter(function(e){return new Date(e.year,e.month,e.day).getTime()<todayMs;});
    tabContent=filterPills+
      (!filtered.length?'<div class="empty-state" style="color:#b0b0c8"><p>No events.</p></div>':'')+
      (upcomingD.length?'<div style="font-size:10px;color:'+accent+';font-family:\'DM Mono\',monospace;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px">Upcoming</div>'+
        upcomingD.map(function(e){return '<div class="ev-list-item" style="background:#fff;border-color:#e8e8f4">'+
          '<div class="ev-list-top">'+
            '<span class="ev-date" style="color:'+e._profile.accent+'">'+MONTHS[e.month].slice(0,3)+' '+e.day+', '+e.year+'</span>'+
            '<span style="font-size:13px;flex:1;color:#1a1a2e">'+esc(e.text)+'</span>'+
            '<span class="chip" style="background:'+e._profile.accent+'18;color:'+e._profile.accent+'">'+e._profile.label+'</span>'+
          '</div></div>';}).join(''):'')+
      (pastD.length?'<div style="opacity:0.5;margin-top:16px"><div style="font-size:10px;color:#8080a0;font-family:\'DM Mono\',monospace;margin-bottom:7px;text-transform:uppercase;letter-spacing:1px">Past</div>'+
        pastD.slice().reverse().map(function(e){return '<div class="ev-list-item" style="background:#fff;border-color:#e8e8f4"><div class="ev-list-top"><span class="ev-date" style="color:'+e._profile.accent+'">'+MONTHS[e.month].slice(0,3)+' '+e.day+', '+e.year+'</span><span style="font-size:13px;flex:1;color:#1a1a2e">'+esc(e.text)+'</span><span class="chip" style="background:'+e._profile.accent+'18;color:'+e._profile.accent+'">'+e._profile.label+'</span></div></div>';}).join('')+'</div>':'');
  } else if(S.docketTab==='links'){
    var filtered=allLinks.filter(filt);
    tabContent=filterPills+
      (!filtered.length?'<div class="empty-state" style="color:#b0b0c8"><p>No links.</p></div>':'')+
      filtered.map(function(l){var cat=CATS.find(function(c){return c.id===l.cat;})||CATS[CATS.length-1];return '<div class="link-card" style="background:#fff;border-color:#e8e8f4;border-left-color:'+cat.color+'" onclick="window.open(\''+(l.url.startsWith('http')?l.url:'https://'+l.url)+'\',\'_blank\')">'+
        '<div class="link-favicon"><img src="https://www.google.com/s2/favicons?domain='+esc(domain(l.url))+'&sz=32" style="width:16px;height:16px" onerror="this.style.display=\'none\'" alt=""/></div>'+
        '<div style="flex:1;min-width:0"><div class="link-domain">'+esc(domain(l.url))+'</div><div class="link-title" style="color:#1a1a2e">'+esc(l.label||l.url)+'</div><div style="margin-top:3px"><span class="chip" style="background:'+l._profile.accent+'18;color:'+l._profile.accent+'">'+l._profile.label+'</span></div></div>'+
      '</div>';}).join('');
  }
  var importHtml=S.showImportModal?renderImportModal(p):'';
  return '<div class="app" style="background:#f0f0f5">'+
    '<div class="header">'+
      '<div class="header-top">'+
        '<div style="position:relative">'+
          '<button class="profile-btn" style="background:#fff;border-color:rgba(96,96,192,0.3)" onclick="toggleMenu()">'+
            ic('layers',13,accent)+'<span class="plabel" style="color:'+accent+'">'+p.label+'</span>'+
            '<span style="display:inline-flex;transform:'+(S.showMenu?'rotate(180deg)':'none')+';transition:transform 0.2s">'+ic('chevronDown',11,'#8080a0')+'</span>'+
          '</button>'+pmHtml+
        '</div>'+
        '<span class="date-label" style="color:#8080a0">'+today.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+'</span>'+
      '</div>'+tabsHtml+
    '</div>'+
    '<div class="backdrop '+(S.showMenu?'open':'')+'" onclick="S.showMenu=false;render()"></div>'+
    '<div class="content">'+tabContent+'</div>'+
    importHtml+
  '</div>';
}

function renderImportModal(p){

  var accent=isDocketView?'#6060c0':p.accent;
  return '<div class="modal-overlay" onclick="closeImportModal()"><div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-hdr"><h3 style="font-size:14px;font-weight:600">Import from File</h3>'+
      '<button onclick="closeImportModal()" style="background:none;border:none;color:#6b6b8a;cursor:pointer">'+ic('x',15,'#6b6b8a')+'</button></div>'+
    (isDocketView?'<div style="background:#e8e8f8;border-radius:8px;padding:10px;margin-bottom:14px;font-size:12px;color:#6060a0">Importing in Docket adds to the selected profile below.</div>':'')+
    '<div style="margin-bottom:12px">'+
      '<div style="font-size:11px;color:#6b6b8a;margin-bottom:6px">Add to tab:</div>'+
      '<div class="row" style="flex-wrap:wrap;gap:6px">'+
        ['todos','notes','calendar','links'].map(function(t){return '<button onclick="S.importTarget=\''+t+'\';render()" style="padding:5px 12px;border-radius:7px;border:1px solid '+(S.importTarget===t?accent:'#2a2a38')+';background:'+(S.importTarget===t?accent+'22':'#1a1a22')+';color:'+(S.importTarget===t?accent:'#6b6b8a')+';font-size:12px;cursor:pointer">'+t.charAt(0).toUpperCase()+t.slice(1)+'</button>';}).join('')+
      '</div>'+
    '</div>'+
    (isDocketView?'<div style="margin-bottom:12px"><div style="font-size:11px;color:#6b6b8a;margin-bottom:6px">Profile:</div>'+
      '<select class="input" style="font-size:14px" onchange="S.importDocketProfile=this.value">'+
        CORE.map(function(pr){return '<option value="'+pr.id+'"'+(S.importDocketProfile===pr.id?' selected':'')+'>'+pr.label+'</option>';}).join('')+
      '</select></div>':'')+
    '<div style="margin-bottom:12px">'+
      '<div style="font-size:11px;color:#6b6b8a;margin-bottom:6px">File (.txt, .csv, or .json backup):</div>'+
      '<div class="import-zone" id="importZone" onclick="document.getElementById(\'importFileInput\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="handleImportDrop(event)">'+
        '<div style="margin-bottom:8px">'+ic('upload',22,'#3a3a50')+'</div>'+
        '<div style="font-size:13px;color:#6b6b8a">'+(S.importFile?'<span style="color:'+accent+'">'+esc(S.importFile.name)+'</span>':'')+'</div>'+
        '<div style="font-size:12px;color:#3a3a50;margin-top:4px">'+(S.importFile?S.importPreview.length+' items found \u2014 tap to change':'Tap to choose file or drag and drop')+'</div>'+
      '</div>'+
      '<input type="file" id="importFileInput" accept=".txt,.csv,.json" style="display:none" onchange="handleImportFile(event)"/>'+
    '</div>'+
    (S.importPreview.length?
      '<div style="margin-bottom:12px;max-height:180px;overflow-y:auto;background:#13131a;border-radius:8px;padding:8px">'+
        '<div style="font-size:10px;color:#5a5a78;font-family:\'DM Mono\',monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px">Preview ('+S.importPreview.length+' items)</div>'+
        S.importPreview.slice(0,30).map(function(line){return '<div style="font-size:12px;color:#9090b0;padding:3px 0;border-bottom:1px solid #1c1c28">'+esc(line)+'</div>';}).join('')+
        (S.importPreview.length>30?'<div style="font-size:11px;color:#3a3a50;padding:4px 0">\u2026and '+(S.importPreview.length-30)+' more</div>':'')+
      '</div>'+
      '<button class="btn" style="background:'+accent+';width:100%" onclick="doImport()">'+ic('plus',13,'white')+' Add '+S.importPreview.length+' items to '+S.importTarget+'</button>'
      :'<button class="btn" style="background:#2a2a38;width:100%;color:#6b6b8a" disabled>Choose a file first</button>')+
  '</div></div>';
}

function evtRow(ev,p,tds,nts,lks){

      '<span style="font-size:13px;flex:1;word-break:break-word">'+esc(ev.text)+'</span>'+

    (ev.address?'<a href="https://maps.google.com/?q='+encodeURIComponent(ev.address)+'" target="_blank" class="ev-list-meta">'+ic('mapPin',10)+' '+esc(ev.address)+'</a>':'')+
    (ev.url?'<a href="'+(ev.url.startsWith('http')?ev.url:'https://'+ev.url)+'" target="_blank" class="ev-list-meta">'+ic('extLink',10)+' '+esc(ev.url.length>40?ev.url.slice(0,40)+'\u2026':ev.url)+'</a>':'')+
    (ev.linkedTodos&&ev.linkedTodos.length?'<div style="margin-top:4px">'+ev.linkedTodos.map(function(id){var t=(tds||[]).find(function(x){return x.id===id;});return t?'<div class="linked-item">'+ic('checkSquare',10,'currentColor')+' '+esc(t.text)+'</div>':'';}).join('')+'</div>':'')+
    (ev.linkedNotes&&ev.linkedNotes.length?'<div>'+ev.linkedNotes.map(function(id){var n=(nts||[]).find(function(x){return x.id===id;});return n?'<div class="linked-item">'+ic('fileText',10,'currentColor')+' '+esc(n.title||'Untitled')+'</div>':'';}).join('')+'</div>':'')+
    (ev.linkedLinks&&ev.linkedLinks.length?'<div>'+ev.linkedLinks.map(function(id){var l=(lks||[]).find(function(x){return x.id===id;});return l?'<div class="linked-item">'+ic('link2',10,'currentColor')+' '+esc(l.label||domain(l.url))+'</div>':'';}).join('')+'</div>':'')+
  '</div>';
}

function switchProfile(id){S.profileId=id;sv('db_activeProfile',id);S.tab='todos';S.docketTab='todos';S.showMenu=false;S.editNote=null;S.newTodo='';S.selFolder=null;S.linkFilter=null;render();}
function toggleMenu(){S.showMenu=!S.showMenu;render();}
function setTab(t){S.tab=t;S.editNote=null;render();}
function addTodo(){var text=S.newTodo.trim();if(!text)return;var tds=todos();tds.unshift({id:uid(),text:text,done:false,priority:S.todoPri,created:new Date().toISOString()});sTodos(tds);S.newTodo='';render();setTimeout(function(){var el=document.getElementById('newTodoInput');if(el)el.focus();},10);}
function toggleTodo(id){var tds=todos();var t=tds.find(function(x){return x.id===id;});if(t)t.done=!t.done;sTodos(tds);render();}
function deleteTodo(id){sTodos(todos().filter(function(t){return t.id!==id;}));render();}
function newNote(){var n={id:uid(),title:'Untitled',body:'',folder:S.selFolder||'',links:[],files:[],updated:new Date().toISOString()};var nts=notes();nts.unshift(n);sNotes(nts);S.editNote=n;S.editTitle=n.title;S.editBody='';S.editFolder=n.folder;S.editLinks=[];S.editFiles=[];S.showAttach=false;render();}
function openNote(id){var n=notes().find(function(x){return x.id===id;});if(!n)return;S.editNote=n;S.editTitle=n.title;S.editBody=n.body;S.editFolder=n.folder||'';S.editLinks=n.links||[];S.editFiles=n.files||[];S.showAttach=false;render();}
function saveNote(){var nts=notes();var i=nts.findIndex(function(x){return x.id===S.editNote.id;});if(i>-1)nts[i]=Object.assign({},nts[i],{title:S.editTitle||'Untitled',body:S.editBody,folder:S.editFolder,links:S.editLinks,files:S.editFiles,updated:new Date().toISOString()});sNotes(nts);S.editNote=null;S.showAttach=false;render();}
function cancelEdit(){S.editNote=null;S.showAttach=false;render();}
function deleteNote(id){sNotes(notes().filter(function(n){return n.id!==id;}));if(S.editNote&&S.editNote.id===id)S.editNote=null;render();}
function addFolder(){var name=S.newFolderName.trim();if(!name)return;var fls=folds();if(fls.indexOf(name)>-1)return;fls.push(name);sFolds(fls);S.newFolderName='';S.showNewFolder=false;render();}
function deleteFolder(name){sFolds(folds().filter(function(f){return f!==name;}));sNotes(notes().map(function(n){return n.folder===name?Object.assign({},n,{folder:''}):n;}));if(S.selFolder===name)S.selFolder=null;render();}
function addNoteLink(){if(!S.noteLink.trim())return;S.editLinks.push({id:uid(),label:S.noteLinkLabel.trim()||S.noteLink.trim(),url:S.noteLink.trim()});S.noteLink='';S.noteLinkLabel='';render();}
function removeNoteLink(id){S.editLinks=S.editLinks.filter(function(l){return l.id!==id;});render();}
function removeNoteFile(id){S.editFiles=S.editFiles.filter(function(f){return f.id!==id;});render();}
function handleFileAttach(e){Array.from(e.target.files).forEach(function(file){var r=new FileReader();r.onload=function(ev){S.editFiles.push({id:uid(),name:file.name,size:file.size,type:file.type,data:ev.target.result});render();};r.readAsDataURL(file);});e.target.value='';}
function prevMo(){if(S.calMonth===0){S.calMonth=11;S.calYear--;}else S.calMonth--;render();}
function nextMo(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;render();}
function openEvtModal(day){S.selDay=day;S.showEvtModal=true;S.evtText='';S.evtAddr='';S.evtUrl='';S.evtExtra=false;S.evtLinkedTodos=[];S.evtLinkedNotes=[];S.evtLinkedLinks=[];S.showLinkPicker=false;render();}
function closeEvtModal(){S.showEvtModal=false;S.selDay=null;S.showLinkPicker=false;render();}
function toggleEvtLink(type,id){
  if(type==='todo'){S.evtLinkedTodos=S.evtLinkedTodos.indexOf(id)>-1?S.evtLinkedTodos.filter(function(x){return x!==id;}):[].concat(S.evtLinkedTodos,[id]);}
  else if(type==='note'){S.evtLinkedNotes=S.evtLinkedNotes.indexOf(id)>-1?S.evtLinkedNotes.filter(function(x){return x!==id;}):[].concat(S.evtLinkedNotes,[id]);}
  else{S.evtLinkedLinks=S.evtLinkedLinks.indexOf(id)>-1?S.evtLinkedLinks.filter(function(x){return x!==id;}):[].concat(S.evtLinkedLinks,[id]);}
  render();
}
function submitEvt(){if(!S.evtText.trim())return;var evts=cevts();evts.push({id:uid(),day:S.selDay,month:S.calMonth,year:S.calYear,text:S.evtText.trim(),address:S.evtAddr.trim(),url:S.evtUrl.trim(),linkedTodos:S.evtLinkedTodos,linkedNotes:S.evtLinkedNotes,linkedLinks:S.evtLinkedLinks});sCevts(evts);S.evtText='';S.evtAddr='';S.evtUrl='';S.evtExtra=false;S.evtLinkedTodos=[];S.evtLinkedNotes=[];S.evtLinkedLinks=[];S.showLinkPicker=false;render();}
function deleteCEvt(id){sCevts(cevts().filter(function(e){return e.id!==id;}));render();}
function extractUrls(text){var rx=/https?:\/\/[^\s,\n\r]+|www\.[^\s,\n\r]+\.[^\s,\n\r]{2,}/gi;return Array.from(new Set(text.match(rx)||[]));}
function addLinks(){var raw=S.linkInput.trim();if(!raw)return;var urls=extractUrls(raw);if(!urls.length){var u=raw.startsWith('http')?raw:'https://'+raw;urls=[u];}var lks=links();var noteText=S.linkNote.trim();urls.forEach(function(url){var cat=catFor(url);lks.unshift({id:uid(),url:url.trim(),label:'',note:noteText,cat:cat.id,saved:new Date().toISOString()});});sLinks(lks);S.linkInput='';S.linkNote='';render();}
function openLink(id){var l=links().find(function(x){return x.id===id;});if(!l)return;var url=l.url.startsWith('http')?l.url:'https://'+l.url;window.open(url,'_blank');}
function deleteLink(id){sLinks(links().filter(function(l){return l.id!==id;}));render();}
function editLink(id){var l=links().find(function(x){return x.id===id;});if(!l)return;S.editingLink=id;S.elLabel=l.label||'';S.elNote=l.note||'';S.elCat=l.cat;render();}
function saveLinkEdit(){var lks=links();var i=lks.findIndex(function(l){return l.id===S.editingLink;});if(i>-1)lks[i]=Object.assign({},lks[i],{label:S.elLabel,note:S.elNote,cat:S.elCat});sLinks(lks);S.editingLink=null;render();}
function docketToggleTodo(profId,id){var tds=ld(pk(profId,'todos'),[]);var t=tds.find(function(x){return x.id===id;});if(t)t.done=!t.done;sv(pk(profId,'todos'),tds);render();}
function docketDeleteTodo(profId,id){sv(pk(profId,'todos'),ld(pk(profId,'todos'),[]).filter(function(t){return t.id!==id;}));render();}
function docketOpenNote(profId,id){switchProfile(profId);S.tab='notes';setTimeout(function(){openNote(id);},50);}
function exportProfile(){var data=Object.assign({version:1,profile:pid(),exported:new Date().toISOString()},profileData(pid()));downloadJSON(data,'dan-v1-'+pid()+'-'+new Date().toISOString().slice(0,10)+'.json');S.showMenu=false;render();}
function exportAllProfiles(){var data={version:1,type:'all',exported:new Date().toISOString()};CORE.forEach(function(pr){data[pr.id]=profileData(pr.id);});downloadJSON(data,'dan-v1-all-'+new Date().toISOString().slice(0,10)+'.json');S.showMenu=false;render();}
function downloadJSON(data,filename){var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();}
function openImportModal(){S.showMenu=false;S.showImportModal=true;S.importPreview=[];S.importFile=null;S.importDocketProfile=CORE[0].id;render();}
function closeImportModal(){S.showImportModal=false;S.importPreview=[];S.importFile=null;render();}
function parseImportText(text){var lines=text.split(/\r?\n/).map(function(l){return l.trim();}).filter(function(l){return l.length>0&&!l.startsWith('#');});return lines.map(function(l){return l.replace(/^["']|["']$/g,'').trim();}).filter(Boolean);}
function handleImportFile(e){
  var file=e.target.files[0];if(!file)return;
  S.importFile=file;
  var reader=new FileReader();
  reader.onload=function(ev){
    var text=ev.target.result;
    if(file.name.endsWith('.json')){
      try{
        var parsed=JSON.parse(text);
        if(parsed.version&&parsed.type==='all'){
          if(confirm('Restore all profiles from this backup? This will overwrite existing data.')){
            CORE.forEach(function(pr){if(parsed[pr.id]){var d=parsed[pr.id];if(d.todos)sv(pk(pr.id,'todos'),d.todos);if(d.notes)sv(pk(pr.id,'notes'),d.notes);if(d.calevents)sv(pk(pr.id,'calevents'),d.calevents);if(d.folders)sv(pk(pr.id,'folders'),d.folders);if(d.links)sv(pk(pr.id,'links'),d.links);}});
            alert('All profiles restored!');closeImportModal();render();return;
          }
        } else if(parsed.version&&parsed.profile){
          var profId=parsed.profile;
          if(confirm('Restore '+profId+' profile? This will overwrite existing data.')){
            if(parsed.todos)sv(pk(profId,'todos'),parsed.todos);if(parsed.notes)sv(pk(profId,'notes'),parsed.notes);if(parsed.calevents)sv(pk(profId,'calevents'),parsed.calevents);if(parsed.folders)sv(pk(profId,'folders'),parsed.folders);if(parsed.links)sv(pk(profId,'links'),parsed.links);
            alert(profId+' profile restored!');closeImportModal();render();return;
          }
        }
      }catch(err){}
    }
    S.importPreview=parseImportText(text);render();
  };
  reader.readAsText(file);
  e.target.value='';
}
function handleImportDrop(e){
  e.preventDefault();
  var zone=document.getElementById('importZone');if(zone)zone.classList.remove('drag');
  var file=e.dataTransfer.files[0];if(!file)return;
  S.importFile=file;
  var reader=new FileReader();
  reader.onload=function(ev){S.importPreview=parseImportText(ev.target.result);render();};
  reader.readAsText(file);
}
function doImport(){
  if(!S.importPreview.length)return;
  var target=S.importTarget;
  var profId=isDock()?(S.importDocketProfile||CORE[0].id):pid();
  var now=new Date().toISOString();
  if(target==='todos'){
    var tds=ld(pk(profId,'todos'),[]);
    S.importPreview.forEach(function(line){tds.unshift({id:uid(),text:line,done:false,priority:'medium',created:now});});
    sv(pk(profId,'todos'),tds);
  } else if(target==='notes'){
    var nts=ld(pk(profId,'notes'),[]);
    S.importPreview.forEach(function(line){nts.unshift({id:uid(),title:line,body:'',folder:'',links:[],files:[],updated:now});});
    sv(pk(profId,'notes'),nts);
  } else if(target==='links'){
    var lks=ld(pk(profId,'links'),[]);
    S.importPreview.forEach(function(line){var url=line.startsWith('http')?line:'https://'+line;lks.unshift({id:uid(),url:url,label:'',note:'',cat:catFor(url).id,saved:now});});
    sv(pk(profId,'links'),lks);
  } else if(target==='calendar'){
    var evts=ld(pk(profId,'calevents'),[]);
    var todayD=new Date();
    S.importPreview.forEach(function(line){
      var day=todayD.getDate(),month=todayD.getMonth(),year=todayD.getFullYear(),text=line;
      var isoMatch=line.match(/^(\d{4})-(\d{2})-(\d{2})[:\s]+(.+)/);
      var relMatch=line.match(/^(\w+ \d+(?:, \d{4})?)[:\s]+(.+)/);
      if(isoMatch){year=parseInt(isoMatch[1]);month=parseInt(isoMatch[2])-1;day=parseInt(isoMatch[3]);text=isoMatch[4].trim();}
      else if(relMatch){try{var dd=new Date(relMatch[1]);if(!isNaN(dd)){day=dd.getDate();month=dd.getMonth();year=dd.getFullYear();}text=relMatch[2].trim();}catch(e2){}}
      evts.push({id:uid(),day:day,month:month,year:year,text:text,address:'',url:'',linkedTodos:[],linkedNotes:[],linkedLinks:[]});
    });
    sv(pk(profId,'calevents'),evts);
  }
  alert(S.importPreview.length+' items added to '+target+(isDock()?' ('+profId+')':'')+'!');
  closeImportModal();
  if(!isDock()&&S.tab!==target)S.tab=target;
  render();
}
render();

</script>
</body>
