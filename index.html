<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="theme-color" content="#090f0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="DAN v2"/>
  <title>DAN v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;}
    body{font-family:'Sora',sans-serif;font-size:14px;background:#090f0b;color:#e8e6f0;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%;overflow-x:hidden;}
    input,textarea,select{font-family:'Sora',sans-serif;font-size:16px;}
    button{font-family:'Sora',sans-serif;font-size:14px;cursor:pointer;}
    a{text-decoration:none;}
    ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px;}
    .app{min-height:100vh;transition:background 0.3s;}
    .header{padding:max(env(safe-area-inset-top,44px),48px) 14px 0;}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .content{padding:14px 14px 100px;}
    .profile-btn{display:flex;align-items:center;gap:6px;background:#13131a;border-radius:9px;padding:6px 11px;border:1px solid #2a2a38;}
    .profile-btn .plabel{font-size:13px;font-weight:600;}
    .profile-menu{position:absolute;top:calc(100%+6px);left:0;background:#14141c;border:1px solid #2a2a38;border-radius:12px;overflow:hidden;z-index:50;min-width:200px;box-shadow:0 12px 40px rgba(0,0,0,0.65);display:none;}
    .profile-menu.open{display:block;}
    .profile-option{display:flex;align-items:center;gap:8px;width:100%;padding:11px 13px;background:transparent;border:none;color:#9090b0;font-size:13px;font-weight:400;border-left:3px solid transparent;text-align:left;cursor:pointer;}
    .profile-option.active{background:#1c1c28;font-weight:600;}
    .profile-option .ab{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;opacity:0.7;}
    .menu-divider{height:1px;background:#1c1c28;margin:4px 0;}
    .menu-action{display:flex;align-items:center;gap:8px;width:100%;padding:10px 13px;background:transparent;border:none;color:#6b6b8a;font-size:12px;text-align:left;cursor:pointer;}
    .menu-action:hover{background:#1a1a24;color:#9090b0;}
    .backdrop{position:fixed;inset:0;z-index:40;display:none;}
    .backdrop.open{display:block;}
    .tabs{display:flex;border-bottom:1px solid #1c1c28;overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab-btn{display:flex;align-items:center;gap:4px;flex-shrink:0;padding:8px 12px;font-size:12px;font-weight:500;color:#6b6b8a;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
    .tab-btn.active{border-bottom-color:currentColor;}
    .tab-content{display:none;}.tab-content.active{display:block;}
    .input{background:#1a1a22;border:1px solid #2a2a38;color:#e8e6f0;border-radius:8px;padding:8px 11px;font-size:16px;outline:none;transition:border-color 0.2s;width:100%;}
    .input:focus{border-color:var(--accent,#22c55e);}
    .input::placeholder{color:#3a3a50;}
    textarea.input{resize:vertical;}
    .btn{border:none;color:white;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:500;transition:filter 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;}
    .btn:active{filter:brightness(0.85);}
    .btn-ghost{background:none;border:1px solid #2a2a38;color:#6b6b8a;padding:6px 11px;border-radius:8px;font-size:13px;cursor:pointer;}
    .btn-icon{background:none;border:none;color:#2e2e40;padding:4px;transition:color 0.15s;display:inline-flex;align-items:center;cursor:pointer;}
    .btn-icon:active{color:#ef4444;}
    .ind{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block;}
    .ind-green{background:#22c55e;} .ind-yellow{background:#f59e0b;} .ind-red{background:#ef4444;} .ind-grey{background:#3a3a50;}
    .todo-row{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;margin-bottom:6px;animation:slideIn 0.15s ease;}
    .todo-row.pinned-row{border-top:2px solid var(--accent);}
    .todo-check{width:20px;height:20px;border-radius:5px;border:2px solid #3a3a50;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;}
    .todo-check.checked{border:none;}
    .pri-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;flex-shrink:0;}
    .due-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;flex-shrink:0;display:inline-flex;align-items:center;gap:3px;}
    .subtask-list{margin-top:7px;padding-top:7px;border-top:1px solid #1c1c28;}
    .subtask-row{display:flex;align-items:center;gap:7px;padding:4px 0;}
    .subtask-check{width:15px;height:15px;border-radius:3px;border:1.5px solid #3a3a50;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
    .subtask-check.checked{border:none;}
    .subtask-add{display:flex;gap:5px;margin-top:6px;}
    .subtask-add input{background:#0f0f14;border:1px solid #2a2a38;border-radius:6px;padding:5px 9px;font-size:14px;color:#e8e6f0;outline:none;flex:1;font-family:'Sora',sans-serif;}
    .subtask-add input:focus{border-color:var(--accent);}
    @keyframes slideIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
    .notes-layout{display:flex;gap:10px;}
    .folder-sidebar{width:120px;flex-shrink:0;}
    .note-card{display:flex;align-items:center;padding:10px 11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;border-left:3px solid;cursor:pointer;margin-bottom:6px;}
    .note-card.pinned-row{border-top:2px solid var(--accent);}
    .note-title{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
    .note-preview{font-size:11px;color:#3a3a50;font-family:'DM Mono',monospace;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .folder-row{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:2px;border:1px solid transparent;position:relative;}
    .folder-count{margin-left:auto;font-size:10px;font-family:'DM Mono',monospace;opacity:0.6;}
    .folder-del{position:absolute;right:3px;background:none;border:none;color:transparent;padding:2px;cursor:pointer;}
    .folder-row:hover .folder-del{color:#ef4444;}
    .editor-title{width:100%;background:transparent;border:none;border-bottom:1px solid #2a2a38;color:#e8e6f0;font-size:18px;font-weight:600;padding:0 0 8px;outline:none;font-family:inherit;margin-bottom:10px;}
    .editor-body{width:100%;background:transparent;border:none;color:#e8e6f0;font-size:16px;line-height:1.7;outline:none;font-family:inherit;resize:vertical;padding:0;min-height:140px;}
    .attach-panel{margin-top:12px;padding:11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;}
    .attach-label{font-size:10px;color:#6b6b8a;margin-bottom:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
    .attach-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;overflow:hidden;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .cal-day-hdr{text-align:center;font-size:10px;font-family:'DM Mono',monospace;color:#3a3a50;padding:3px 0;}
    .cal-cell{min-height:46px;padding:4px 3px;border-radius:6px;background:#13131a;border:1px solid #1a1a22;cursor:pointer;}
    .cal-cell:active{background:#1e1e2a;} .cal-cell.empty{background:transparent;border:none;cursor:default;}
    .cal-num{font-size:11px;text-align:right;margin-bottom:2px;color:#909090;}
    .cal-num.today{font-weight:700;}
    .cal-ev-pill{font-size:9px;border-radius:3px;padding:1px 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
    .modal{background:#17171f;border:1px solid #2a2a38;border-radius:18px 18px 0 0;padding:18px 16px 40px;width:100%;max-height:92vh;overflow-y:auto;}
    .modal-full{border-radius:18px;margin:20px 10px;max-height:calc(100vh - 40px);}
    .modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
    .ev-card{background:#0f0f13;border-radius:8px;padding:9px 10px;margin-bottom:6px;}
    .ev-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;}
    .ev-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b6b8a;margin-top:4px;}
    .ev-list-item{padding:9px 11px;background:#13131a;border-radius:8px;border:1px solid #1c1c28;margin-bottom:6px;}
    .ev-list-top{display:flex;align-items:flex-start;gap:7px;}
    .ev-date{font-family:'DM Mono',monospace;font-size:11px;min-width:75px;flex-shrink:0;padding-top:1px;}
    .ev-list-meta{display:flex;align-items:center;gap:4px;font-size:11px;color:#6b6b8a;margin-top:4px;margin-left:82px;}
    .linked-item{display:flex;align-items:center;gap:6px;padding:4px 7px;background:#1a1a24;border-radius:5px;margin-top:3px;font-size:11px;color:#9090b0;cursor:pointer;}
    .linked-item:hover{color:var(--accent);}
    .link-card{display:flex;align-items:flex-start;gap:9px;padding:10px 11px;background:#13131a;border-radius:9px;border:1px solid #1c1c28;border-left:3px solid;animation:slideIn 0.15s ease;margin-bottom:6px;cursor:pointer;}
    .link-card.pinned-row{border-top:2px solid var(--accent);}
    .link-favicon{width:18px;height:18px;border-radius:4px;flex-shrink:0;background:#2a2a38;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:1px;}
    .link-domain{font-family:'DM Mono',monospace;font-size:10px;color:#5a5a78;margin-bottom:2px;}
    .link-title{font-size:13px;font-weight:500;line-height:1.3;word-break:break-word;}
    .link-note{font-size:11px;color:#6b6b8a;margin-top:3px;}
    .cat-group-hdr{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin:16px 0 7px;display:flex;align-items:center;gap:5px;}
    .cat-pill{font-size:10px;padding:3px 7px;border-radius:5px;font-family:'DM Mono',monospace;cursor:pointer;}
    .link-paste-area{width:100%;min-height:40px;background:#1a1a22;border:1px dashed #2a2a38;border-radius:8px;padding:9px 11px;font-size:16px;color:#e8e6f0;outline:none;font-family:'Sora',sans-serif;resize:none;transition:border-color 0.2s;}
    .link-paste-area:focus{border-color:var(--accent,#22c55e);border-style:solid;}
    .link-paste-area::placeholder{color:#3a3a50;}
    .picker-row{display:flex;align-items:center;gap:7px;padding:7px 9px;background:#13131a;border-radius:7px;border:1px solid #1c1c28;margin-bottom:4px;cursor:pointer;}
    .picker-row.selected{border-color:var(--accent);background:var(--accent-dim,rgba(34,197,94,0.08));}
    .picker-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);flex-shrink:0;}
    .import-zone{border:2px dashed #2a2a38;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:border-color 0.2s;}
    .import-zone:hover,.import-zone.drag{border-color:var(--accent);}
    .chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;}
    .date-label{font-size:11px;color:#5a5a78;font-family:'DM Mono',monospace;}
    .section-label{font-size:10px;font-family:'DM Mono',monospace;color:#5a5a78;text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
    .row{display:flex;gap:6px;align-items:center;} .flex1{flex:1;min-width:0;}
    .empty-state{text-align:center;padding:44px 0 26px;color:#2e2e40;}
    .empty-state p{font-size:13px;margin-top:9px;line-height:1.6;}
    .fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,20px)+20px);right:18px;width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:transform 0.15s;cursor:pointer;}
    .fab:active{transform:scale(0.92);}
    .search-bar{display:flex;align-items:center;gap:8px;background:#13131a;border:1px solid #2a2a38;border-radius:10px;padding:8px 12px;margin-bottom:14px;}
    .search-bar input{background:none;border:none;outline:none;color:#e8e6f0;font-size:14px;flex:1;font-family:'Sora',sans-serif;}
    .search-bar input::placeholder{color:#3a3a50;}
    .sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
    .sort-btn{font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid #2a2a38;background:#13131a;color:#6b6b8a;font-family:'DM Mono',monospace;cursor:pointer;}
    .sort-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);}
    .review-item{background:#13131a;border:1px solid #2a2a38;border-radius:9px;padding:10px 12px;margin-bottom:8px;}
    .review-item-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .review-field{margin-bottom:5px;}
    .review-field label{font-size:10px;color:#5a5a78;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:3px;}
    /* Docket dark theme */
    .docket-bg{background:#1a1a1f;}
    .docket-card{background:#22222a;border:1px solid #2e2e3a;border-radius:9px;padding:10px 12px;margin-bottom:6px;}
    .docket-tabs{border-bottom-color:#2e2e3a !important;}
    .docket-input{background:#22222a !important;border-color:#2e2e3a !important;}
  </style>
</head>

// Due date helpers
function dueStatus(dueDate,done){
if(!dueDate)return null;if(done)return ‘complete’;
var today=new Date();today.setHours(0,0,0,0);
var due=new Date(dueDate+‘T00:00:00’);
var diff=Math.round((due-today)/(1000*60*60*24));
if(diff<0)return ‘overdue’;if(diff<=3)return ‘upcoming’;return ‘ok’;
}
function dueBadge(due,done){
if(!due)return ‘’;
var st=dueStatus(due,done);
var c={complete:’#22c55e’,overdue:’#ef4444’,upcoming:’#f59e0b’,ok:’#5a5a78’}[st]||’#5a5a78’;
var d=new Date(due+‘T00:00:00’);
var lbl=d.toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’});
return ‘<span class="due-badge" style="background:'+c+'18;color:'+c+'">’+ic(‘clock’,9,c)+’ ‘+lbl+’</span>’;
}
function dueInd(st){
if(!st)return ‘’;
var m={complete:‘ind-green’,overdue:‘ind-red’,upcoming:‘ind-yellow’,ok:‘ind-grey’};
return ‘<span class="ind '+(m[st]||'ind-grey')+'"></span>’;
}

// ── Smart Paste / Review ──────────────────────────────────────────
function isMultiLine(t){return t.trim().split(/\r?\n/).filter(function(l){return l.trim();}).length>1;}
function parseSmartItems(text,tab){
var lines=text.trim().split(/\r?\n/).filter(function(l){return l.trim();});
var PL={high:‘high’,medium:‘medium’,med:‘medium’,low:‘low’};
return lines.map(function(line){
line=line.trim().replace(/^[-*\u2022]\s*/,’’).replace(/^\d+[.)]\s*/,’’);
var item={id:uid(),raw:line};
if(tab===‘todos’){
var pm=line.match(/\b(high|med|medium|low)\b/i);
var dm=line.match(/\b(\d{4}-\d{2}-\d{2})\b/);
item.text=line.replace(/\s*[[(](high|med|medium|low)[])]?\s*/i,’’).replace(/\s*due[:\s]+\S+/i,’’).trim()||line;
item.priority=pm?PL[pm[1].toLowerCase()]||‘medium’:‘medium’;
item.due=dm?dm[1]:’’;
} else if(tab===‘notes’){
var parts=line.split(/[:—–-]\s(.+)/);
item.title=parts[0].trim().slice(0,80)||line.slice(0,80);
item.body=parts.length>1?parts[1].trim():’’;
} else if(tab===‘calendar’){
var today=new Date();item.day=today.getDate();item.month=today.getMonth();item.year=today.getFullYear();item.text=line;
var im=line.match(/^(\d{4}-\d{2}-\d{2})[:\s]+(.+)/);
if(im){var dd=new Date(im[1]+‘T00:00:00’);item.day=dd.getDate();item.month=dd.getMonth();item.year=dd.getFullYear();item.text=im[2].trim();}
item.date=item.year+’-’+String(item.month+1).padStart(2,‘0’)+’-’+String(item.day).padStart(2,‘0’);
item.address=’’;
} else if(tab===‘links’){
var um=line.match(/https?://\S+|www.\S+.\S+/);
item.url=um?um[0]:(line.startsWith(‘http’)?line:‘https://’+line);
item.label=line.replace(item.url,’’).trim()||’’;
item.cat=catFor(item.url).id;
}
return item;
});
}

// ── Search ────────────────────────────────────────────────────────
function runSearch(q){
if(!q.trim())return null;q=q.toLowerCase();
var r={todos:[],notes:[],links:[],events:[]};
var profs=isDock()?CORE:[P()];
profs.forEach(function(pr){
var d=profileData(pr.id);
d.todos.forEach(function(t){if((t.text||’’).toLowerCase().includes(q))r.todos.push(Object.assign({},t,{_profile:pr}));});
d.notes.forEach(function(n){if(((n.title||’’)+(n.body||’’)).toLowerCase().includes(q))r.notes.push(Object.assign({},n,{_profile:pr}));});
d.links.forEach(function(l){if(((l.url||’’)+(l.label||’’)+(l.note||’’)).toLowerCase().includes(q))r.links.push(Object.assign({},l,{_profile:pr}));});
d.calevents.forEach(function(e){if((e.text||’’).toLowerCase().includes(q))r.events.push(Object.assign({},e,{_profile:pr}));});
});
return r;
}
function renderSearchHtml(r,p){
if(!r)return ‘’;
var accent=isDock()?’#4a9eff’:p.accent;
var total=r.todos.length+r.notes.length+r.links.length+r.events.length;
if(!total)return ‘<div style="text-align:center;padding:24px;color:#3a3a50;font-size:13px">No results</div>’;
var h=’<div style="font-size:11px;color:#5a5a78;font-family:\'DM Mono\',monospace;margin-bottom:12px">’+total+’ result’+(total===1?’’:‘s’)+’</div>’;

// ── ICS Export/Import ─────────────────────────────────────────────
function exportIcs(){
var allEvts=[];
var profs=isDock()?CORE:[P()];
profs.forEach(function(pr){ld(pk(pr.id,‘calevents’),[]).forEach(function(e){allEvts.push(e);});});
if(!allEvts.length){alert(‘No events to export.’);return;}
var lines=[‘BEGIN:VCALENDAR’,‘VERSION:2.0’,‘PRODID:-//DAN v2//EN’,‘CALSCALE:GREGORIAN’];
allEvts.forEach(function(e){
var d=new Date(e.year,e.month,e.day);
var dtStr=e.year+String(e.month+1).padStart(2,‘0’)+String(e.day).padStart(2,‘0’);
var dtNext=new Date(d);dtNext.setDate(dtNext.getDate()+1);
var dtNextStr=dtNext.getFullYear()+String(dtNext.getMonth()+1).padStart(2,‘0’)+String(dtNext.getDate()).padStart(2,‘0’);
lines.push(‘BEGIN:VEVENT’,‘UID:’+e.id+’@dan-v2’,‘DTSTART;VALUE=DATE:’+dtStr,‘DTEND;VALUE=DATE:’+dtNextStr,‘SUMMARY:’+e.text.replace(/[,;\]/g,function(c){return ‘\’+c;})+(e.address?’\r\nLOCATION:’+e.address.replace(/[,;\]/g,function(c){return ‘\’+c;}):’’),‘END:VEVENT’);
});
lines.push(‘END:VCALENDAR’);
var blob=new Blob([lines.join(’\r\n’)],{type:‘text/calendar’});
var a=document.createElement(‘a’);a.href=URL.createObjectURL(blob);a.download=‘dan-events.ics’;a.click();
}
function parseIcs(text){
var evts=[],cur=null;
text.split(/\r?\n/).forEach(function(line){
if(line===‘BEGIN:VEVENT’){cur={};}
else if(line===‘END:VEVENT’&&cur){if(cur.text&&cur.day!==undefined)evts.push(cur);cur=null;}
else if(cur){
if(line.startsWith(‘SUMMARY:’)){cur.text=line.slice(8).replace(/\[,;\]/g,function(m){return m[1];});}
else if(line.startsWith(‘DTSTART’)){var d=line.replace(/.*:/,’’).trim().slice(0,8);if(d.length===8){cur.year=parseInt(d.slice(0,4));cur.month=parseInt(d.slice(4,6))-1;cur.day=parseInt(d.slice(6,8));}}
else if(line.startsWith(‘LOCATION:’)){cur.address=line.slice(9);}
}
});
return evts;
}
function handleIcsFile(e){
var file=e.target.files[0];if(!file)return;
S.icsImportFile=file;
var r=new FileReader();r.onload=function(ev){S.icsImportPreview=parseIcs(ev.target.result);render();};r.readAsText(file);
e.target.value=’’;
}

var profId=isDock()?S.qcProfile:pid();

S.icsImportPreview.forEach(function(e){
evts.push({id:uid(),day:e.day,month:e.month,year:e.year,text:e.text||‘Imported Event’,address:e.address||’’,url:’’,linkedTodos:[],linkedNotes:[],linkedLinks:[]});

sv(pk(profId,‘calevents’),evts);
alert(S.icsImportPreview.length+’ events imported!’);
S.showIcsModal=false;S.icsImportPreview=[];S.icsImportFile=null;render();
}

CORE.map(function(pr){return ‘<button class="cat-pill" onclick="S.docketFilter=\''+pr.id+'\';render()" style="background:'+(S.docketFilter===pr.id?pr.accent+'22':'#22222a')+';color:'+(S.docketFilter===pr.id?pr.accent:'#5a5a78')+';border:1px solid '+(S.docketFilter===pr.id?pr.accent+'55':'#2e2e3a')+'">’+pr.label+’</button>’;}).join(’’)+
‘</div>’;

function switchProfile(id){S.profileId=id;sv(‘db_activeProfile’,id);S.tab=‘todos’;S.docketTab=‘todos’;S.showMenu=false;S.editNote=null;S.newTodo=’’;S.selFolder=null;S.linkFilter=null;S.readFilter=null;S.searchQuery=’’;render();}
function toggleMenu(){S.showMenu=!S.showMenu;render();}
function setTab(t){S.tab=t;S.editNote=null;S.searchQuery=’’;render();}

// Todos
function addTodo(){
var text=S.newTodo.trim();if(!text)return;
if(triggerSmartPaste(text,‘todos’)){S.newTodo=’’;return;}
var tds=todos();tds.unshift({id:uid(),text:text,done:false,priority:S.todoPri,due:S.newTodoDue,subtasks:[],pinned:false,created:new Date().toISOString()});
sTodos(tds);S.newTodo=’’;S.newTodoDue=’’;S.showTodoDueField=false;render();
setTimeout(function(){var el=document.getElementById(‘newTodoInput’);if(el)el.focus();},10);
}
function handleTodoPaste(e){
setTimeout(function(){
var val=document.getElementById(‘newTodoInput’).value;
if(isMultiLine(val)){S.newTodo=’’;if(triggerSmartPaste(val,‘todos’))document.getElementById(‘newTodoInput’).value=’’;}
},10);
}
function toggleTodo(id){
var tds=todos();var t=tds.find(function(x){return x.id===id;});
if(!t)return;
var wasAutoDone=t.done;
t.done=!t.done;
if(!t.done)t.subtasks=(t.subtasks||[]).map(function(s){return Object.assign({},s,{done:false});});
sTodos(tds);render();
}
function deleteTodo(id){sTodos(todos().filter(function(t){return t.id!==id;}));render();}
function pinTodo(id){var tds=todos();var t=tds.find(function(x){return x.id===id;});if(t)t.pinned=!t.pinned;sTodos(tds);render();}

// Subtasks
function addSubtask(todoId){
var text=S.newSubtaskText.trim();if(!text)return;
var tds=todos();var t=tds.find(function(x){return x.id===todoId;});
if(!t)return;if(!t.subtasks)t.subtasks=[];
t.subtasks.push({id:uid(),text:text,done:false});
sTodos(tds);S.newSubtaskText=’’;S.addingSubtaskTo=todoId;render();
setTimeout(function(){var el=document.getElementById(‘subInput_’+todoId);if(el){el.value=’’;el.focus();}},20);
}
function toggleSubtask(todoId,subId){
var tds=todos();var t=tds.find(function(x){return x.id===todoId;});
if(!t||!t.subtasks)return;
var s=t.subtasks.find(function(x){return x.id===subId;});
if(s)s.done=!s.done;
var allDone=t.subtasks.length>0&&t.subtasks.every(function(x){return x.done;});
if(allDone&&!t.done){t.done=true;}
else if(!allDone&&t.done){t.done=false;}
sTodos(tds);render();
}
function deleteSubtask(todoId,subId){
var tds=todos();var t=tds.find(function(x){return x.id===todoId;});
if(!t)return;t.subtasks=(t.subtasks||[]).filter(function(s){return s.id!==subId;});
sTodos(tds);render();
}

// Notes
function newNote(){var n={id:uid(),title:‘Untitled’,body:’’,folder:S.selFolder||’’,links:[],files:[],pinned:false,created:new Date().toISOString(),updated:new Date().toISOString()};var nts=notes();nts.unshift(n);sNotes(nts);S.editNote=n;S.editTitle=n.title;S.editBody=’’;S.editFolder=n.folder;S.editLinks=[];S.editFiles=[];S.showAttach=false;render();}
function openNote(id){var n=notes().find(function(x){return x.id===id;});if(!n)return;S.editNote=n;S.editTitle=n.title;S.editBody=n.body;S.editFolder=n.folder||’’;S.editLinks=n.links||[];S.editFiles=n.files||[];S.showAttach=false;render();}
function saveNote(){var nts=notes();var i=nts.findIndex(function(x){return x.id===S.editNote.id;});if(i>-1)nts[i]=Object.assign({},nts[i],{title:S.editTitle||‘Untitled’,body:S.editBody,folder:S.editFolder,links:S.editLinks,files:S.editFiles,updated:new Date().toISOString()});sNotes(nts);S.editNote=null;S.showAttach=false;render();}
function cancelEdit(){S.editNote=null;S.showAttach=false;render();}
function deleteNote(id){sNotes(notes().filter(function(n){return n.id!==id;}));if(S.editNote&&S.editNote.id===id)S.editNote=null;render();}
function pinNote(id){var nts=notes();var n=nts.find(function(x){return x.id===id;});if(n)n.pinned=!n.pinned;sNotes(nts);render();}
function addFolder(){var name=S.newFolderName.trim();if(!name)return;var fls=folds();if(fls.indexOf(name)>-1)return;fls.push(name);sFolds(fls);S.newFolderName=’’;S.showNewFolder=false;render();}
function deleteFolder(name){sFolds(folds().filter(function(f){return f!==name;}));sNotes(notes().map(function(n){return n.folder===name?Object.assign({},n,{folder:’’}):n;}));if(S.selFolder===name)S.selFolder=null;render();}
function addNoteLink(){if(!S.noteLink.trim())return;S.editLinks.push({id:uid(),label:S.noteLinkLabel.trim()||S.noteLink.trim(),url:S.noteLink.trim()});S.noteLink=’’;S.noteLinkLabel=’’;render();}
function removeNoteLink(id){S.editLinks=S.editLinks.filter(function(l){return l.id!==id;});render();}
function removeNoteFile(id){S.editFiles=(S.editFiles||[]).filter(function(f){return f.id!==id;});render();}
function handleFileAttach(e){Array.from(e.target.files).forEach(function(file){var r=new FileReader();r.onload=function(ev){if(!S.editFiles)S.editFiles=[];S.editFiles.push({id:uid(),name:file.name,size:file.size,type:file.type,data:ev.target.result});render();};r.readAsDataURL(file);});e.target.value=’’;}

// Calendar
function prevMo(){if(S.calMonth===0){S.calMonth=11;S.calYear–;}else S.calMonth–;render();}
function nextMo(){if(S.calMonth===11){S.calMonth=0;S.calYear++;}else S.calMonth++;render();}
function openEvtModal(day){S.selDay=day;S.showEvtModal=true;S.evtText=’’;S.evtAddr=’’;S.evtUrl=’’;S.evtExtra=false;S.evtLinkedTodos=[];S.evtLinkedNotes=[];S.evtLinkedLinks=[];S.showLinkPicker=false;render();}
function closeEvtModal(){S.showEvtModal=false;S.selDay=null;S.showLinkPicker=false;render();}
function toggleEvtLink(type,id){
if(type===‘todo’){S.evtLinkedTodos=S.evtLinkedTodos.indexOf(id)>-1?S.evtLinkedTodos.filter(function(x){return x!==id;}):[].concat(S.evtLinkedTodos,[id]);}
else if(type===‘note’){S.evtLinkedNotes=S.evtLinkedNotes.indexOf(id)>-1?S.evtLinkedNotes.filter(function(x){return x!==id;}):[].concat(S.evtLinkedNotes,[id]);}
else{S.evtLinkedLinks=S.evtLinkedLinks.indexOf(id)>-1?S.evtLinkedLinks.filter(function(x){return x!==id;}):[].concat(S.evtLinkedLinks,[id]);}
render();
}
function submitEvt(){if(!S.evtText.trim())return;var evts=cevts();evts.push({id:uid(),day:S.selDay,month:S.calMonth,year:S.calYear,text:S.evtText.trim(),address:S.evtAddr.trim(),url:S.evtUrl.trim(),linkedTodos:S.evtLinkedTodos,linkedNotes:S.evtLinkedNotes,linkedLinks:S.evtLinkedLinks});sCevts(evts);S.evtText=’’;S.evtAddr=’’;S.evtUrl=’’;S.evtExtra=false;S.evtLinkedTodos=[];S.evtLinkedNotes=[];S.evtLinkedLinks=[];S.showLinkPicker=false;render();}
function deleteCEvt(id){sCevts(cevts().filter(function(e){return e.id!==id;}));render();}

// Links
function extractUrls(text){var rx=/https?://[^\s,\n\r]+|www.[^\s,\n\r]+.[^\s,\n\r]{2,}/gi;return Array.from(new Set(text.match(rx)||[]));}
function handleLinkPaste(e){
setTimeout(function(){
var el=document.getElementById(‘linkInput’);if(!el)return;
var val=el.value;
if(isMultiLine(val)){S.linkInput=’’;el.value=’’;triggerSmartPaste(val,‘links’);}
},10);
}
function addLinks(){
var raw=S.linkInput.trim();if(!raw)return;
if(isMultiLine(raw)){S.linkInput=’’;triggerSmartPaste(raw,‘links’);return;}
var urls=extractUrls(raw);if(!urls.length){var u=raw.startsWith(‘http’)?raw:‘https://’+raw;urls=[u];}
var lks=links();var noteText=S.linkNote.trim();
urls.forEach(function(url){var cat=catFor(url);lks.unshift({id:uid(),url:url.trim(),label:’’,note:noteText,cat:cat.id,read:false,pinned:false,saved:new Date().toISOString()});});
sLinks(lks);S.linkInput=’’;S.linkNote=’’;render();
}
function openLink(id){var l=links().find(function(x){return x.id===id;});if(!l)return;var url=l.url.startsWith(‘http’)?l.url:‘https://’+l.url;window.open(url,’_blank’);if(!l.read){var lks=links();var li=lks.find(function(x){return x.id===id;});if(li){li.read=true;sLinks(lks);render();}}}
function deleteLink(id){sLinks(links().filter(function(l){return l.id!==id;}));render();}
function pinLink(id){var lks=links();var l=lks.find(function(x){return x.id===id;});if(l)l.pinned=!l.pinned;sLinks(lks);render();}
function toggleRead(id){var lks=links();var l=lks.find(function(x){return x.id===id;});if(l)l.read=!l.read;sLinks(lks);render();}
function editLink(id){var l=links().find(function(x){return x.id===id;});if(!l)return;S.editingLink=id;S.elLabel=l.label||’’;S.elNote=l.note||’’;S.elCat=l.cat;render();}
function saveLinkEdit(){var lks=links();var i=lks.findIndex(function(l){return l.id===S.editingLink;});if(i>-1)lks[i]=Object.assign({},lks[i],{label:S.elLabel,note:S.elNote,cat:S.elCat});sLinks(lks);S.editingLink=null;render();}

// Docket actions
function docketToggleTodo(profId,id){var tds=ld(pk(profId,‘todos’),[]);var t=tds.find(function(x){return x.id===id;});if(t)t.done=!t.done;sv(pk(profId,‘todos’),tds);render();}
function docketDeleteTodo(profId,id){sv(pk(profId,‘todos’),ld(pk(profId,‘todos’),[]).filter(function(t){return t.id!==id;}));render();}
function docketOpenNote(profId,id){switchProfile(profId);S.tab=‘notes’;setTimeout(function(){openNote(id);},50);}

// Export/Import
function exportProfile(){var data=Object.assign({version:1,profile:pid(),exported:new Date().toISOString()},profileData(pid()));downloadJSON(data,‘dan-v2-’+pid()+’-’+new Date().toISOString().slice(0,10)+’.json’);S.showMenu=false;render();}
function exportAllProfiles(){var data={version:1,type:‘all’,exported:new Date().toISOString()};CORE.forEach(function(pr){data[pr.id]=profileData(pr.id);});downloadJSON(data,‘dan-v2-all-’+new Date().toISOString().slice(0,10)+’.json’);S.showMenu=false;render();}
function downloadJSON(data,filename){var blob=new Blob([JSON.stringify(data,null,2)],{type:‘application/json’});var a=document.createElement(‘a’);a.href=URL.createObjectURL(blob);a.download=filename;a.click();}
function openImportModal(){S.showMenu=false;S.showImportModal=true;S.importPreview=[];S.importFile=null;S.importDocketProfile=CORE[0].id;render();}
function closeImportModal(){S.showImportModal=false;S.importPreview=[];S.importFile=null;render();}
function parseImportText(text){return text.split(/\r?\n/).map(function(l){return l.trim();}).filter(function(l){return l.length>0&&!l.startsWith(’#’);}).map(function(l){return l.replace(/^[”’]|[”’]$/g,’’).trim();}).filter(Boolean);}
function handleImportFile(e){
var file=e.target.files[0];if(!file)return;S.importFile=file;
var reader=new FileReader();
reader.onload=function(ev){
var text=ev.target.result;
if(file.name.endsWith(’.json’)){
try{
var parsed=JSON.parse(text);
if(parsed.version&&parsed.type===‘all’){
if(confirm(‘Restore all profiles from backup? This will overwrite existing data.’)){
CORE.forEach(function(pr){if(parsed[pr.id]){var d=parsed[pr.id];if(d.todos)sv(pk(pr.id,‘todos’),d.todos);if(d.notes)sv(pk(pr.id,‘notes’),d.notes);if(d.calevents)sv(pk(pr.id,‘calevents’),d.calevents);if(d.folders)sv(pk(pr.id,‘folders’),d.folders);if(d.links)sv(pk(pr.id,‘links’),d.links);}});
alert(‘All profiles restored!’);closeImportModal();render();return;
}
} else if(parsed.version&&parsed.profile){
var profId=parsed.profile;
if(confirm(‘Restore ‘+profId+’ profile? This will overwrite existing data.’)){
if(parsed.todos)sv(pk(profId,‘todos’),parsed.todos);if(parsed.notes)sv(pk(profId,‘notes’),parsed.notes);if(parsed.calevents)sv(pk(profId,‘calevents’),parsed.calevents);if(parsed.folders)sv(pk(profId,‘folders’),parsed.folders);if(parsed.links)sv(pk(profId,‘links’),parsed.links);
alert(profId+’ profile restored!’);closeImportModal();render();return;
}
}
}catch(err){}
}
S.importPreview=parseImportText(text);render();
};
reader.readAsText(file);e.target.value=’’;
}
function handleImportDrop(e){
e.preventDefault();var zone=document.getElementById(‘importZone’);if(zone)zone.classList.remove(‘drag’);
var file=e.dataTransfer.files[0];if(!file)return;S.importFile=file;
var reader=new FileReader();reader.onload=function(ev){S.importPreview=parseImportText(ev.target.result);render();};reader.readAsText(file);
}
function doImport(){
if(!S.importPreview.length)return;
var target=S.importTarget,profId=S.importDocketProfile||CORE[0].id,now=new Date().toISOString();
if(target===‘todos’){var t=ld(pk(profId,‘todos’),[]);S.importPreview.forEach(function(line){t.unshift({id:uid(),text:line,done:false,priority:‘medium’,due:’’,subtasks:[],pinned:false,created:now});});sv(pk(profId,‘todos’),t);}
else if(target===‘notes’){var n=ld(pk(profId,‘notes’),[]);S.importPreview.forEach(function(line){n.unshift({id:uid(),title:line,body:’’,folder:’’,links:[],files:[],pinned:false,created:now,updated:now});});sv(pk(profId,‘notes’),n);}
else if(target===‘links’){var l=ld(pk(profId,‘links’),[]);S.importPreview.forEach(function(line){var url=line.startsWith(‘http’)?line:‘https://’+line;l.unshift({id:uid(),url:url,label:’’,note:’’,cat:catFor(url).id,read:false,pinned:false,saved:now});});sv(pk(profId,‘links’),l);}
else if(target===‘calendar’){var evts=ld(pk(profId,‘calevents’),[]);var todayD=new Date();S.importPreview.forEach(function(line){var day=todayD.getDate(),month=todayD.getMonth(),year=todayD.getFullYear(),text=line;var im=line.match(/^(\d{4}-\d{2}-\d{2})[:\s]+(.+)/);if(im){var dd=new Date(im[1]+‘T00:00:00’);day=dd.getDate();month=dd.getMonth();year=dd.getFullYear();text=im[2].trim();}evts.push({id:uid(),day:day,month:month,year:year,text:text,address:’’,url:’’,linkedTodos:[],linkedNotes:[],linkedLinks:[]});});sv(pk(profId,‘calevents’),evts);}
alert(S.importPreview.length+’ items added to ‘+target+’ (’+profId+’)!’);
closeImportModal();render();
}

render();
</script>
